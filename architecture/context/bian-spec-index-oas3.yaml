  link: architecture/cache/bian/release14.0.0/oas3/yamls/AccountReconciliation.yaml
  type: oas3
- name: AccountRecovery
  description: This service domain handles the restructuring of a distressed account (loan) after standard recovery procedures have been exhausted
  link: architecture/cache/bian/release14.0.0/oas3/yamls/AccountRecovery.yaml
  type: oas3
- name: AccountsReceivable
  description: This service domain handles accounts receivable for invoices issue by the bank to customers and partners. It includes follow-up
    and resolution activity for delayed/missed payments
  link: architecture/cache/bian/release14.0.0/oas3/yamls/AccountsReceivable.yaml
  type: oas3
- name: AdvancedVoiceServicesManagement
  description: Oversee the configuration and operation of the voice channel facilities
  link: architecture/cache/bian/release14.0.0/oas3/yamls/AdvancedVoiceServicesManagement.yaml
  type: oas3
- name: AdvancedVoiceServicesOperations
  description: This service domain operates the telephone channel infrastructure, including the IVR and any other automated devices as appropriate.
    This includes handling default routing rules and intra-day/session adjustments to deal with peak load or other operational variations
  link: architecture/cache/bian/release14.0.0/oas3/yamls/AdvancedVoiceServicesOperations.yaml
  type: oas3
- name: Advertising
  description: Develop the plan for and oversee advertising campaign activity, including budget and resource management
  link: architecture/cache/bian/release14.0.0/oas3/yamls/Advertising.yaml
  type: oas3
- name: ArchiveServices
  description: The Archive Services Service Domain enables the bank to retain, maintain and access significant documents that are no longer actively
    accessed but that might be required in the future
  link: architecture/cache/bian/release14.0.0/oas3/yamls/ArchiveServices.yaml
  type: oas3
- name: AssetAndLiabilityManagement
  description: The unit overseeing the  banks asset & liability policies and position
  link: architecture/cache/bian/release14.0.0/oas3/yamls/AssetAndLiabilityManagement.yaml
  type: oas3
- name: AssetSecuritization
  description: Determine and select assets for securitization as needed to maintain and optimize the Bank's portfolio. Administer the securitization
    process
  link: architecture/cache/bian/release14.0.0/oas3/yamls/AssetSecuritization.yaml
  type: oas3
- name: ATMNetworkOperations
  description: Handling the automated operation of the ATM network and linked devices, including tracing physical cash and document movements
  link: architecture/cache/bian/release14.0.0/oas3/yamls/ATMNetworkOperations.yaml
  type: oas3
- name: BankDrafts
  description: This Service Domain support bank guaranteed payment transactions such as bank drafts
  link: architecture/cache/bian/release14.0.0/oas3/yamls/BankDrafts.yaml
  type: oas3
- name: BankGuarantee
  description: This Service Domain handles the pricing and issuance of a broad range of bank guarantee instruments
  link: architecture/cache/bian/release14.0.0/oas3/yamls/BankGuarantee.yaml
  type: oas3
- name: BranchCurrencyDistribution
  description: Schedule and coordinate the secure distribution of cash inventory across the branch and ATM networks.
  link: architecture/cache/bian/release14.0.0/oas3/yamls/BranchCurrencyDistribution.yaml
  type: oas3
- name: BranchCurrencyManagement
  description: Track cash inventory, project demand and ensure all cash is accounted for within the branch
  link: architecture/cache/bian/release14.0.0/oas3/yamls/BranchCurrencyManagement.yaml
  type: oas3
- name: BranchLocationManagement
  description: Manage and oversee branch activity, assign resources to optimize branch performance
  link: architecture/cache/bian/release14.0.0/oas3/yamls/BranchLocationManagement.yaml
  type: oas3
- name: BranchLocationOperations
  description: The day to day administration of branch activity, including teller assignment and cash handling oversight
  link: architecture/cache/bian/release14.0.0/oas3/yamls/BranchLocationOperations.yaml
  type: oas3
- name: BrandManagement
  description: Respond to events that potentially damage the brand or provide an opportunity to strengthen/leverage brand awareness
  link: architecture/cache/bian/release14.0.0/oas3/yamls/BrandManagement.yaml
  type: oas3
- name: BrokeredProductProxy
  description: This Service Domain oversees all activities associated with the coordinated delivery of 3rd party products and services
  link: architecture/cache/bian/release14.0.0/oas3/yamls/BrokeredProductProxy.yaml
  type: oas3
- name: BusinessDevelopment
  description: Define, implement, track and assess the new business development plans
  link: architecture/cache/bian/release14.0.0/oas3/yamls/BusinessDevelopment.yaml
  type: oas3
- name: BusinessUnitManagement
  description: Track and report on business unit activity and financial performance
  link: architecture/cache/bian/release14.0.0/oas3/yamls/BusinessUnitManagement.yaml
  type: oas3
- name: CardAuthorization
  description: This service domain is responsible for the real time card authorization decisions for credit/charge cards.
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CardAuthorization.yaml
  type: oas3
- name: CardCase
  description: This service domain handles the processing of a customer card case, typically a disputed charge
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CardCase.yaml
  type: oas3
- name: CardClearing
  description: This service domain orchestrates the capture and consolidation of card financial transactions originating from various sources,
    such as POS Network, E-Commerce Gateway, ATM Network, or Card Case Management. It also handles the clearing of the transactions from the Acquirers
    to the Issuers through the Card Networks
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CardClearing.yaml
  type: oas3
- name: CardCollections
  description: This service domain administers the recovery of outstanding amounts from cancelled card accounts through internal or external collection
    agencies.  This may involve negotiating payment terms and/or interest write-downs.
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CardCollections.yaml
  type: oas3
- name: CardeCommerceGateway
  description: This service domain orchestrates the processing of e-commerce transactions for authentication, authorization and capture of the
    financial transactions.
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CardeCommerceGateway.yaml
  type: oas3
- name: CardFinancialSettlement
  description: This service domain orchestrates the settlement of the transactions between the Issuers and the Acquirers through the Card Networks.
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CardFinancialSettlement.yaml
  type: oas3
- name: CardNetworkParticipantFacility
  description: This service domain orchestrates the activities related to the inclusion of new Acquirers and Issuers in the Card Network, their
    terms and conditions and their status.
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CardNetworkParticipantFacility.yaml
  type: oas3
- name: CardTerminalAdministration
  description: This service domain administers the POS Network including the inventory, terminal characteristics, deployment and status of the
    POS devices.
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CardTerminalAdministration.yaml
  type: oas3
- name: CardTerminalOperation
  description: This service domain handle POS operations including processing, capture and tracking of the transactions originating at the Point
    of Sale devices.
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CardTerminalOperation.yaml
  type: oas3
- name: CardTransactionCapture
  description: A distributed facility to capture card transactions at the point of sale
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CardTransactionCapture.yaml
  type: oas3
- name: CardTransactionSwitch
  description: This service domain orchestrates the switching and routing of Card Authorization and Financial transactions received through the
    Card POS Network, Card E-Commerce Gateway, or the ATM Network from the Acquirer to the Issuer through the Card Networks.
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CardTransactionSwitch.yaml
  type: oas3
- name: CardTransactionTracking
  description: Maintain a log of credit card bookings and authorizations for operational and management information, tracking and reconciliation
    purposes.
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CardTransactionTracking.yaml
  type: oas3
- name: CaseRootCauseAnalysis
  description: Root cause analysis business function reviews case reports to identify possible improvements to eliminate/mitigate servicing issues
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CaseRootCauseAnalysis.yaml
  type: oas3
- name: CashConcentration
  description: Cash Concentration is a cash management service aimed at moving a balance, or part of a balance of an account to a different account
    to meet various requirements.
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CashConcentration.yaml
  type: oas3
- name: CashManagementAndAccountServices
  description: This service domain orchestrates a cash management and accounting services facility typically used by corporations to support additional
    cash management features over and above the standard facilities of current and savings accounts
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CashManagementAndAccountServices.yaml
  type: oas3
- name: CentralCashHandling
  description: Track cash inventory, project demand and allocate inventory across the branch/ATM network
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CentralCashHandling.yaml
  type: oas3
- name: ChannelActivityAnalysis
  description: This service domain tracks and analyzes channel activity to support relationship development, to detect unwanted behavior, possible
    fraud, and to constrain channel use as necessary (for example tracking usage frequency and cumulative transaction amounts within a period)
  link: architecture/cache/bian/release14.0.0/oas3/yamls/ChannelActivityAnalysis.yaml
  type: oas3
- name: ChannelActivityHistory
  description: This service domains consolidates and captures customer channel usage activity to support channel activity analysis and also can
    be referenced for customer access authorization and routing decisions
  link: architecture/cache/bian/release14.0.0/oas3/yamls/ChannelActivityHistory.yaml
  type: oas3
- name: ChequeLockBox
  description: This Service Domain support paper cheque processing services offered to corporate customers
  link: architecture/cache/bian/release14.0.0/oas3/yamls/ChequeLockBox.yaml
  type: oas3
- name: ChequeProcessing
  description: Handle the processing of paper cheques, generating financial transactions for processing
  link: architecture/cache/bian/release14.0.0/oas3/yamls/ChequeProcessing.yaml
  type: oas3
- name: ClaimAdministration
  description: The claim administration Service Domain implements the payment and support obligations of the policy in respect to a verified claim
  link: architecture/cache/bian/release14.0.0/oas3/yamls/ClaimAdministration.yaml
  type: oas3
- name: ClaimAssessment
  description: The Claim Assessment Service Domain runs through the required tests to confirm the veracity of a claim made under an insurance
    policy.
  link: architecture/cache/bian/release14.0.0/oas3/yamls/ClaimAssessment.yaml
  type: oas3
- name: CollateralAllocationManagement
  description: The Service Domain manages the allocation of party owned assets to bank issued lending and other asset products.
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CollateralAllocationManagement.yaml
  type: oas3
- name: CollateralAssetAdministration
  description: This service domain maintains the status of a customers collateral assets, including scheduled and ad-hoc valuations and confirmation
    of the correct completion of scheduled maintenance tasks.
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CollateralAssetAdministration.yaml
  type: oas3
- name: Collections
  description: Handles the liquidation of assets to offset the losses for problem accounts
  link: architecture/cache/bian/release14.0.0/oas3/yamls/Collections.yaml
  type: oas3
- name: CommissionAgreement
  description: Maintain and administer the terms and transactions for employee and broker commissions
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CommissionAgreement.yaml
  type: oas3
- name: Commissions
  description: The service domain processes commissions for transactions for eligible employees
  link: architecture/cache/bian/release14.0.0/oas3/yamls/Commissions.yaml
  type: oas3
- name: CompetitorAnalysis
  description: Solicit, consolidate and analyze competitor specific public domain data to develop competitor insights and comparisons
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CompetitorAnalysis.yaml
  type: oas3
- name: ComplianceReporting
  description: This service domain administers and orchestrates the tasks required to apply and report on internal audit control and reporting
    activity
  link: architecture/cache/bian/release14.0.0/oas3/yamls/ComplianceReporting.yaml
  type: oas3
- name: ConsumerAdvisoryServices
  description: Offer financial advisory services to consumer customers, possibly for a fee
  link: architecture/cache/bian/release14.0.0/oas3/yamls/ConsumerAdvisoryServices.yaml
  type: oas3
- name: ConsumerInvestments
  description: Handle the consumer front-end trading requests. These will typically be blocked/netted for market execution
  link: architecture/cache/bian/release14.0.0/oas3/yamls/ConsumerInvestments.yaml
  type: oas3
- name: ConsumerLoan
  description: This service domain handles the fulfillment of a consumer loan product. This includes the initial set-up of the loan facility and
    the completion of scheduled and ad-hoc product processing tasks
  link: architecture/cache/bian/release14.0.0/oas3/yamls/ConsumerLoan.yaml
  type: oas3
- name: ContactCenterManagement
  description: Oversee the assignment and operation of the customer contact center
  link: architecture/cache/bian/release14.0.0/oas3/yamls/ContactCenterManagement.yaml
  type: oas3
- name: ContactCenterOperations
  description: Administer the day to day activity in the contact center - allocate positions and track staff availability and performance
  link: architecture/cache/bian/release14.0.0/oas3/yamls/ContactCenterOperations.yaml
  type: oas3
- name: ContactHandler
  description: This service domain handles a customer's interactive contact with the bank. This will typically involve launching of one or more
    channel/device specific dialogue sessions as necessary within the customer contact
  link: architecture/cache/bian/release14.0.0/oas3/yamls/ContactHandler.yaml
  type: oas3
- name: ContactRouting
  description: The Contact Routing service domain tracks servicing resource availability and uses any known details about the customer contact
    (e.g. identity, indicated purpose of call, status of the relationship) to make an optimal routing decision. The routing selection may include
    matching the required product knowledge/skills to the available servicing resources.
  link: architecture/cache/bian/release14.0.0/oas3/yamls/ContactRouting.yaml
  type: oas3
- name: ContractorandSupplierAgreement
  description: This Service Domain maintains appropriate supplier agreements/contracts
  link: architecture/cache/bian/release14.0.0/oas3/yamls/ContractorandSupplierAgreement.yaml
  type: oas3
- name: CorporateAction
  description: This Service Domain supports the various custodial tasks associated with processing associated corporate actions for customer's
    with securities held at the bank
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CorporateAction.yaml
  type: oas3
- name: CorporateCurrentAccount
  description: This service domain orchestrates a corporate checking/demand deposit account. The typical range of services and fees covers payments
    and deposits, standing orders, sweeps, liens, check and debit card access.
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CorporateCurrentAccount.yaml
  type: oas3
- name: CorporateFinance
  description: This Service Domain handles the provision of a broad range of financial advisory services to corporate clients
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CorporateFinance.yaml
  type: oas3
- name: CorporateLease
  description: The Corporate Lease product provides corporate customers with loans to support leasing activity for property and equipment under
    an umbrella leasing arrangement
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CorporateLease.yaml
  type: oas3
- name: CorporateLoan
  description: This service domain handles the fulfillment of a corporate loan product. This includes the initial set-up of the loan facility
    and the completion of scheduled and ad-hoc product processing tasks
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CorporateLoan.yaml
  type: oas3
- name: CorporatePayrollServices
  description: The Corporate Payroll Services Service Domain handles payroll payment processing for the employees of a corporate customer.
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CorporatePayrollServices.yaml
  type: oas3
- name: CorporateTaxAdvisory
  description: A fee or commission based product providing tax specific assessments, advice and guidance for corporate customers
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CorporateTaxAdvisory.yaml
  type: oas3
- name: CorporateTreasury
  description: This service domain orchestrates the consolidation and presentation of summary transaction details in order to assemble a timely
    and accurate view of the overall treasury position of the Bank at any one time. It is also responsible for determining the different interest
    and exchange rates applied to different products and services within the bank
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CorporateTreasury.yaml
  type: oas3
- name: CorporateTrustServices
  description: This Service Domain provides corporate trust services centered on the handling of debt instruments and escrow account support
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CorporateTrustServices.yaml
  type: oas3
- name: Correspondence
  description: This service domain orchestrates the production of pre-formatted correspondence and batches of correspondence (e.g. mail shots).
  link: architecture/cache/bian/release14.0.0/oas3/yamls/Correspondence.yaml
  type: oas3
- name: CorrespondentBankDirectory
  description: This service domain maintains correspondent bank reference details. This includes correspondent bank payment parameters in particular
    bank limits and capturing transaction activity to track reciprocity
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CorrespondentBankDirectory.yaml
  type: oas3
- name: CorrespondentBankRelationshipManagement
  description: This Service Domain manages correspondent bank relations, ensuring reciprocity and developing business where possible
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CorrespondentBankRelationshipManagement.yaml
  type: oas3
- name: CounterpartyAdministration
  description: This Service Domain maintains key counterparty reference information used in the clearing and settlement of wholesale trading
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CounterpartyAdministration.yaml
  type: oas3
- name: CreditCard
  description: This service domain orchestrates the scheduled maintenance and transactional activities associated with credit card product fulfillment
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CreditCard.yaml
  type: oas3
- name: CreditFacility
  description: The Credit Facility Service Domain manages the Credit Facilities that a Corporate Customer has with the bank. A Credit Facility
    is an agreement between the bank and a (corporate) customer to allow the customer to acquire asset products from the bank up to the limit
    of the credit facility without the need for a full due diligence and underwriting for each of these products.
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CreditFacility.yaml
  type: oas3
- name: CreditManagement
  description: This service domain provides a bank-wide/oversight function to qualify credit pricing for offered products and services to reflect
    the bank's appetite to write the business. This decision can override the standard product pricing procedure
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CreditManagement.yaml
  type: oas3
- name: CreditRiskModels
  description: This service domain handles the design and maintenance of a portfolio of credit models that are used in all aspects of customer
    credit assessments
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CreditRiskModels.yaml
  type: oas3
- name: CreditRiskOperations
  description: This Service Domain monitors counterparty credit limits in the trading unit
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CreditRiskOperations.yaml
  type: oas3
- name: CurrencyExchange
  description: Service Domain supports over the counter currency exchange
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CurrencyExchange.yaml
  type: oas3
- name: CurrentAccount
  description: This service domain orchestrates a consumer checking/demand deposit account. The typical range of services and fees covers payments
    and deposits, standing orders, sweeps, liens, check and debit card access.
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CurrentAccount.yaml
  type: oas3
- name: CustodyAdministration
  description: A service to provide safe custody services for marketable securities for bank customers
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CustodyAdministration.yaml
  type: oas3
- name: CustomerAccessEntitlement
  description: This service domain maintains the details of the allowed channel/device based access to products and services that the customer
    has in place.  This profile is referenced in servicing and fulfillment activity and may include customer preferences and access limits/constraints
    that span multiple products.
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CustomerAccessEntitlement.yaml
  type: oas3
- name: CustomerAgreement
  description: This service domain maintains the master customer agreement/legal contract. Note that a customer can be a complex corporate entity
    with many subsidiaries operating in different geopolitical areas. The customer agreement is linked to as many Sales Product Agreements as
    needed for all in-force products
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CustomerAgreement.yaml
  type: oas3
- name: CustomerBehaviorInsights
  description: This service domain applies behavioral analysis to customer event history to maintain a range of customer ratings/scores (such
    as 'propensity to buy') and to detect life events or trends
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CustomerBehaviorInsights.yaml
  type: oas3
- name: CustomerBehaviorModels
  description: This service domain handles the design and maintenance of a portfolio of customer behavior models that might be used in all aspects
    of customer relationship development, sales, servicing and product fulfillment
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CustomerBehaviorModels.yaml
  type: oas3
- name: CustomerBilling
  description: This service domains provides a central service to compose, issue and track customer billing and invoices
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CustomerBilling.yaml
  type: oas3
- name: CustomerCampaignDesign
  description: Design and refine customer campaign specifications based on their impact
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CustomerCampaignDesign.yaml
  type: oas3
- name: CustomerCampaignExecution
  description: Execute a customer campaign (version) and track and respond to impact
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CustomerCampaignExecution.yaml
  type: oas3
- name: CustomerCampaignManagement
  description: Assess the coverage and impact of internal/customer campaigns and redirect campaign development and execution activity accordingly
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CustomerCampaignManagement.yaml
  type: oas3
- name: CustomerCase
  description: This service domain handles the initiation, tracking, resolution and reporting on customer cases (issues that typically require
    corrective response to some financial transaction)
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CustomerCase.yaml
  type: oas3
- name: CustomerCaseManagement
  description: Track and assess case load and resolution activity - allocate resources as necessary to optimize case resolution performance
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CustomerCaseManagement.yaml
  type: oas3
- name: CustomerCreditRating
  description: This service domain maintains and administers the bank's credit assessment for customers based on consolidated internal data and
    optionally by referencing external credit agency reports
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CustomerCreditRating.yaml
  type: oas3
- name: CustomerEventHistory
  description: This service domain captures, classifies and stores relationship, servicing and product fulfillment related customer events. In
    addition to servicing and product transaction details, the log can capture life/relationship events that are revealed during customer exchanges
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CustomerEventHistory.yaml
  type: oas3
- name: CustomerFinancialInsights
  description: This service domain applies behavioral analysis to the customer financial history to develop financial insights that can highlight
    business development opportunities or detect possible concerns with a customer's financial wellfare
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CustomerFinancialInsights.yaml
  type: oas3
- name: CustomerOffer
  description: This service domain orchestrates the processing of a product offer for a new or established  customer. The offer process is defined
    specifically for the product or service being considered and can include actions such as document checks, collateral allocation, credit assessments,
    underwriting decisions, regulatory and procedural checks, eligibility checks, the use of internal and external specialist services (such as
    evaluations and legal advice).
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CustomerOffer.yaml
  type: oas3
- name: CustomerPortfolio
  description: Maintain a portfolio of analytical views of the customer base to support customer segment profitability and performance analysis
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CustomerPortfolio.yaml
  type: oas3
- name: CustomerPosition
  description: This service domain maintains a consolidated financial position for a customer, combining details from all products and services
    in use. The position can cover available funds, credit, collateral, tax exposure and other financial measures as necessary
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CustomerPosition.yaml
  type: oas3
- name: CustomerProductandServiceDirectory
  description: This Service Domain maintains the most important details of all the products and services that a customer has acquired from the
    bank.
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CustomerProductandServiceDirectory.yaml
  type: oas3
- name: CustomerProductAndServiceEligibility
  description: This Service Domain maintains a list of products and services for which a customer is eligible.
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CustomerProductAndServiceEligibility.yaml
  type: oas3
- name: CustomerProposition
  description: This Service Domain maintains bank and customer defined requirements spanning all products and services
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CustomerProposition.yaml
  type: oas3
- name: CustomerRelationshipManagement
  description: This service domain develops and executes a customer plan to maintain and build a customer relationship. Activities include ongoing
    customer contact, tracking internal and external events and activity of interest and relevance, product and service matching and sales, processing
    ad-hoc queries, trouble shooting and issue resolution including the initial phases of troubled account recovery
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CustomerRelationshipManagement.yaml
  type: oas3
- name: CustomerSurveys
  description: Define and execute and analyze customer surveys
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CustomerSurveys.yaml
  type: oas3
- name: CustomerTaxHandling
  description: This service domain handles consumer tax reporting obligations including the consolidation and reporting of customer tax related
    financial activity
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CustomerTaxHandling.yaml
  type: oas3
- name: CustomerWorkbench
  description: This service domain represents customer side devices. Most commonly providing a customer access portal to the banks products and
    services through any suitable channel and device
  link: architecture/cache/bian/release14.0.0/oas3/yamls/CustomerWorkbench.yaml
  type: oas3
