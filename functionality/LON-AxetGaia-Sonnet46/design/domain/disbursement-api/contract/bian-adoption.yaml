omitted_schemas:
  reason_Involvedparty: "Mapeado a campos simples (executed_by, beneficiary_name) en el contrato LON"
  reason_PaymentArrangement: "Detalles de pago simplificados; solo amount y currency retenidos"
  reason_LoanAgreement: "Mapeado a credit_request_id (UUID interno) en el contrato LON"
  reason_Interestarrangement: "Intereses gestionados por el core bancario; fuera del scope de LON originación"
  reason_Limitarrangement: "Límites no aplican al flujo de desembolso LON"
