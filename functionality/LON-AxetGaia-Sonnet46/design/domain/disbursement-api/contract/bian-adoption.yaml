field_mappings:
  - bian_field: DisbursementTransaction.DisbursementProcessReference
    lon_field: id
    type_adaptation: "BIAN Identifier → UUID string (ISO 4122)"

  - bian_field: DisbursementTransaction.ProductInstanceReference (LoanAgreement)
    lon_field: credit_request_id
    type_adaptation: "BIAN LoanAgreement → UUID string (referencia interna LON)"
    note: "AP adaptation: replaces LoanAgreement object with LON CreditRequest UUID"

  - bian_field: DisbursementTransaction.BeneficiaryAccountReference
    lon_field: destination_account
    type_adaptation: "BIAN Account object → string account number"

  - bian_field: DisbursementTransaction.PaymentAmount
