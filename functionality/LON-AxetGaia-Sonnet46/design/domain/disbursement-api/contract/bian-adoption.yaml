    type_adaptation: "BIAN Amount object → decimal number"

  - bian_field: DisbursementTransaction.PaymentCurrency
    lon_field: currency
    type_adaptation: "BIAN Currencycode → ISO 4217 string (3 chars)"

  - bian_field: DisbursementTransaction.DisbursementExecutionDate
    lon_field: disbursed_at
    type_adaptation: "BIAN Datetime → ISO 8601 date-time string"

  - bian_field: DisbursementTransaction.AuthorisingEmployeeReference
    lon_field: executed_by
    type_adaptation: "BIAN Involvedparty → string (employee ID)"

  - bian_field: DisbursementTransaction.BeneficiaryName
    lon_field: beneficiary_name
    type_adaptation: "BIAN Name → string"

  - bian_field: DisbursementTransaction.DisbursementStatus
    lon_field: status
    type_adaptation: "BIAN Status → enum [PENDING, EXECUTED, FAILED]"

adaptation_rationale: >
  El SD BIAN Disbursement cubre exactamente el caso de uso UC-LON-007 (Ejecutar desembolso).
  Se adopta directamente el Control Record DisbursementTransaction con las siguientes adaptaciones:
  
  1. ProductInstanceReference se simplifica a credit_request_id (UUID del sistema LON) en lugar
     del objeto LoanAgreement completo de BIAN — el sistema LON no gestiona el LoanAgreement
     directamente (eso es responsabilidad del Core Bancario).
  
  2. Los tipos de objetos complejos de BIAN (Amount, Account, Name, Datetime) se simplifican
     a tipos primitivos (decimal, string, date-time) para optimizar el contrato REST.
  
  3. Se añaden campos LON-específicos: credit_request_id y idempotency_key (no en BIAN baseline).
  
  4. Los paths omitidos (Update, Control, Request) no son necesarios para el flujo de originación;
     la confirmación del core se gestiona via Exchange, y la intervención manual es operativa.
