# api-landscape.yaml — LON (Sistema de Originación de Créditos)
# Phase 3: solution-landscape (draft) / Phase 4: api-landscape-design (final)
# Generated by: Axet Plugin – Target Architecture Design Agent v4.1.0
functionality_id: LON
generated_at: "2026-06-17"
domain_standard: BIAN-Release-14
maturity: draft
validation: pending

apis:
  # ──────────────────────────────────────────────────────────────
  # EXPERIENCE LAYER
  # ──────────────────────────────────────────────────────────────
  - id: API-LON-EXP-001
    name: credit-origination-exp-api
    layer: experience
    path: design/experience/credit-origination-exp-api
    description: >
      BFF (Backend for Frontend) para la SPA React de originación de créditos.
      Agrega y orquesta llamadas a las APIs de capas inferiores, adaptando
      las respuestas a las necesidades del frontend. Soporta los 5 roles con
      sus respectivas vistas y acciones disponibles.
    technology: Node.js (Express) / Java (Spring Boot)
    api_style: REST
    versioning: URI (/v1)
    security:
      authentication: OAuth2 / OpenID Connect / JWT
      authorization: RBAC (5 roles)
      scopes:
        - credit:read
        - credit:write
        - risk:read
        - disbursement:read
        - disbursement:write
    consumers:
      - Frontend React SPA (todos los actores)
    dependencies:
      - credit-request-api
      - risk-assessment-api
      - disbursement-api
    key_endpoints:
      - "GET  /v1/credit-applications"
      - "POST /v1/credit-applications"
      - "GET  /v1/credit-applications/{id}"
      - "GET  /v1/credit-applications/{id}/timeline"
      - "POST /v1/credit-applications/{id}/documents"
      - "GET  /v1/credit-applications/{id}/risk-assessment"
      - "POST /v1/credit-applications/{id}/submit"
      - "POST /v1/credit-applications/{id}/approve"
      - "POST /v1/credit-applications/{id}/reject"
      - "POST /v1/credit-applications/{id}/escalate"
      - "POST /v1/credit-applications/{id}/disburse"
    bian_alignment: "N/A — Experience layer"
    nfr:
      sla_ms: 500
      idempotency: true
    status: to_design

  # ──────────────────────────────────────────────────────────────
  # BUSINESS LAYER
  # ──────────────────────────────────────────────────────────────
  - id: API-LON-BUS-001
    name: credit-request-api
    layer: business
    path: design/business/credit-request-api
    description: >
      API de gestión del ciclo de vida de solicitudes de crédito. Implementa
      la state machine de 12 estados, validación de transiciones por rol,
      integración KYC con core bancario, gestión de documentos vía DMS
      y registro de decisiones crediticias con trazabilidad completa.
    technology: Node.js (Express) / Java (Spring Boot)
    api_style: REST
    versioning: URI (/v1)
    security:
      authentication: OAuth2 / OpenID Connect / JWT
      authorization: RBAC
      roles_with_access: [CREDIT_OFFICER, RISK_ANALYST, CREDIT_MANAGER, CREDIT_COMMITTEE, DISBURSEMENT_OFFICER]
    consumers:
      - credit-origination-exp-api
    dependencies:
      - core-banking-adapter-api  # KYC
      - dms-adapter-api           # Documentos
    key_endpoints:
      - "POST /v1/CustomerOffer/Initiate"
      - "GET  /v1/CustomerOffer/{customerofferid}/Retrieve"
      - "PUT  /v1/CustomerOffer/{customerofferid}/Update"
      - "PUT  /v1/CustomerOffer/{customerofferid}/Exchange"
      - "GET  /v1/CustomerOffer"
    bian_alignment:
      service_domain: CustomerOffer
      adoption_level: semantic_alignment
      source_oas3: architecture/cache/bian/release14.0.0/oas3/yamls/CustomerOffer.yaml
    stateful: true
    state_machine:
      states: [DRAFT, SUBMITTED, UNDER_REVIEW, RISK_ASSESSED, PENDING_APPROVAL, PENDING_COMMITTEE, APPROVED, REJECTED, PENDING_DISBURSEMENT, DISBURSED, CANCELLED, EXPIRED]
    nfr:
      sla_ms: 500
      idempotency: true
      acid_transactions: true
    status: to_design

  - id: API-LON-BUS-002
    name: risk-assessment-api
    layer: business
    path: design/business/risk-assessment-api
    description: >
      API de evaluación de riesgo crediticio. Orquesta la consulta al bureau
      de crédito (vía adaptador), calcula el DTI ratio, registra el score
      crediticio, nivel de riesgo (LOW/MEDIUM/HIGH/CRITICAL) y recomendación
      de aprobación. Determina el nivel de decisor requerido (gerente vs comité).
    technology: Node.js (Express) / Java (Spring Boot)
    api_style: REST
    versioning: URI (/v1)
    security:
      authentication: OAuth2 / OpenID Connect / JWT
      authorization: RBAC
      roles_with_access: [RISK_ANALYST, CREDIT_MANAGER, CREDIT_OFFICER]
    consumers:
      - credit-origination-exp-api
    dependencies:
      - credit-bureau-adapter-api  # Score y reporte bureau
    key_endpoints:
      - "POST /v1/Underwriting/Initiate"
      - "GET  /v1/Underwriting/{underwritingid}/Retrieve"
      - "PUT  /v1/Underwriting/{underwritingid}/Update"
      - "PUT  /v1/Underwriting/{underwritingid}/Exchange"
    bian_alignment:
      service_domain: Underwriting
      secondary_sd: CustomerCreditRating
      adoption_level: semantic_alignment
      source_oas3: architecture/cache/bian/release14.0.0/oas3/yamls/Underwriting.yaml
    nfr:
      sla_ms: 1000
      cache: "Redis TTL 24h para reportes de bureau"
    status: to_design

  # ──────────────────────────────────────────────────────────────
  # DOMAIN LAYER
  # ──────────────────────────────────────────────────────────────
  - id: API-LON-DOM-001
    name: disbursement-api
    layer: domain
    path: design/domain/disbursement-api
    description: >
      API de ejecución de desembolso de créditos aprobados. Coordina la
      instrucción de transferencia al core bancario, recibe la confirmación
      con referencia del core, actualiza el estado a DISBURSED y registra
      fecha y referencia del desembolso.
    technology: Node.js (Express) / Java (Spring Boot)
    api_style: REST
    versioning: URI (/v1)
    security:
      authentication: OAuth2 / OpenID Connect / JWT
      authorization: RBAC
      roles_with_access: [DISBURSEMENT_OFFICER]
    consumers:
      - credit-origination-exp-api
    dependencies:
      - core-banking-adapter-api  # Instrucción y confirmación desembolso
    key_endpoints:
      - "POST /v1/Disbursement/Initiate"
      - "PUT  /v1/Disbursement/{disbursementid}/Execute"
      - "PUT  /v1/Disbursement/{disbursementid}/Exchange"
      - "GET  /v1/Disbursement/{disbursementid}/Retrieve"
    bian_alignment:
      service_domain: Disbursement
      adoption_level: direct
      control_record: DisbursementTransaction
      source_oas3: architecture/cache/bian/release14.0.0/oas3/yamls/Disbursement.yaml
    nfr:
      sla_ms: 2000
      idempotency: true
    status: to_design

  # ──────────────────────────────────────────────────────────────
  # SUPPORT LAYER
  # ──────────────────────────────────────────────────────────────
  - id: API-LON-SUP-001
    name: credit-bureau-adapter-api
    layer: support
    path: design/support/credit-bureau-adapter-api
    description: >
      Adaptador de integración con el Bureau de Crédito externo. Abstrae la
      comunicación con proveedores (Equifax, TransUnion, Experian), gestiona
      el caché Redis TTL 24h para reducir costos de consulta, implementa
      retry con backoff exponencial y circuit breaker.
    technology: Node.js (Express) / Java (Spring Boot)
    api_style: REST
    versioning: URI (/v1)
    consumers:
      - risk-assessment-api
    external_system: Credit Bureau (Equifax / TransUnion / Experian)
    key_endpoints:
      - "GET  /v1/credit-reports/{customerId}"
      - "POST /v1/credit-reports/query"
    nfr:
      cache: "Redis TTL 24h"
      circuit_breaker: "5 fallos / 30s"
      retry: "Backoff exponencial"
      timeout_ms: 800
    bian_alignment: "N/A — Support/Integration layer"
    status: to_design

  - id: API-LON-SUP-002
    name: core-banking-adapter-api
    layer: support
    path: design/support/core-banking-adapter-api
    description: >
      Adaptador de integración con el Core Bancario. Expone operaciones de
      validación KYC, creación del producto crédito en core, instrucción de
      desembolso y consulta de tabla de amortización. Implementa retry y
      circuit breaker para alta disponibilidad.
    technology: Node.js (Express) / Java (Spring Boot)
    api_style: REST
    versioning: URI (/v1)
    consumers:
      - credit-request-api    # KYC
      - disbursement-api      # Desembolso
    external_system: Core Bancario
    key_endpoints:
      - "GET  /v1/customers/{customerId}/kyc"
      - "POST /v1/loan-products"
      - "POST /v1/disbursements"
      - "GET  /v1/disbursements/{disbursementId}/status"
      - "GET  /v1/amortization-schedules/{loanId}"
    nfr:
      circuit_breaker: "5 fallos / 30s"
      retry: "Backoff exponencial"
    bian_alignment: "N/A — Support/Integration layer"
    status: to_design

  - id: API-LON-SUP-003
    name: dms-adapter-api
    layer: support
    path: design/support/dms-adapter-api
    description: >
      Adaptador de integración con el Document Management System (DMS).
      Gestiona el almacenamiento de documentos del expediente crediticio,
      recuperación por referencia y validación de integridad. Implementa
      fallback local si el DMS no está disponible.
    technology: Node.js (Express) / Java (Spring Boot)
    api_style: REST
    versioning: URI (/v1)
    consumers:
      - credit-request-api
    external_system: Document Management System (DMS)
    key_endpoints:
      - "POST /v1/documents"
      - "GET  /v1/documents/{documentId}"
      - "GET  /v1/documents?creditRequestId={id}"
      - "DELETE /v1/documents/{documentId}"
    nfr:
      fallback: "Almacenamiento temporal configurable si DMS no disponible"
    bian_alignment: "N/A — Support/Integration layer"
    status: to_design
