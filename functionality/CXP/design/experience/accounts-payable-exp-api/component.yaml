# Phase 5 Output: Component Design - accounts-payable-exp-api
schema_version: "1.0"
functionality_id: CXP
component_id: accounts-payable-exp-api
phase: backend-component-design
generated_at: "2026-06-17"

name: "Accounts Payable Experience API"
layer: experience
pattern: BFF
type: REST API
version: "v1"
technology: "Node.js (Express)"
base_path: "/api/v1/accounts-payable"

description: >
  BFF (Backend for Frontend) que agrega y adapta datos de invoice-management-api
  y payment-management-api para la SPA React. Implementa RBAC por rol y
  sirve como punto único de entrada para el canal web.

responsibilities:
  - "Exponer endpoints REST agregados para la UI"
  - "Validar tokens OAuth2/OIDC y aplicar RBAC"
  - "Agregar respuestas de múltiples APIs de negocio"
  - "Mapear DTOs internos a modelos de presentación"
  - "Propagar X-Correlation-ID a APIs downstream"

capabilities: [CAP-CXP-005]
use_cases: [UC-CXP-001, UC-CXP-002, UC-CXP-003, UC-CXP-004, UC-CXP-007]

endpoints:
  - method: GET
    path: /invoices
    description: "Listar facturas con filtros (roles: ALL)"
    query_params: [status, supplier_id, from_date, to_date, limit, cursor]
    rbac: [ANALYST, MANAGER, TREASURER]
    downstream: invoice-management-api

  - method: POST
    path: /invoices
    description: "Registrar nueva factura"
    rbac: [ANALYST]
    downstream: invoice-management-api

  - method: GET
    path: /invoices/{id}
    description: "Detalle de factura"
    rbac: [ANALYST, MANAGER, TREASURER]
    downstream: invoice-management-api

  - method: PUT
    path: /invoices/{id}
    description: "Editar factura (solo PENDING)"
    rbac: [ANALYST]
    downstream: invoice-management-api

  - method: POST
    path: /invoices/{id}/approve
    description: "Aprobar factura"
    rbac: [MANAGER]
    downstream: invoice-management-api

  - method: POST
    path: /invoices/{id}/reject
    description: "Rechazar factura"
    rbac: [MANAGER]
    downstream: invoice-management-api

  - method: POST
    path: /invoices/{id}/cancel
    description: "Cancelar factura"
    rbac: [ANALYST, MANAGER]
    downstream: invoice-management-api

  - method: POST
    path: /invoices/{id}/schedule-payment
    description: "Programar pago de factura"
    rbac: [TREASURER]
    downstream: payment-management-api

  - method: GET
    path: /payments
    description: "Listar pagos"
    rbac: [TREASURER]
    downstream: payment-management-api

  - method: GET
    path: /payments/{id}
    description: "Detalle de pago"
    rbac: [TREASURER]
    downstream: payment-management-api

security:
  authentication: OAuth2/OIDC
  token_validation: JWT Bearer
  rbac_enforcement: middleware
  roles: [ANALYST, MANAGER, TREASURER]

downstream_dependencies:
  - api: invoice-management-api
    operations: [list_invoices, create_invoice, get_invoice, update_invoice, approve, reject, cancel]
  - api: payment-management-api
    operations: [schedule_payment, list_payments, get_payment]

persistence:
  required: false
  cache:
    enabled: optional
    strategy: "Response cache para listas de facturas (TTL: 30s)"

nfr:
  sla_ms: 300
  observability:
    tracing: OpenTelemetry
    metrics: Prometheus
    logging: "Structured JSON"
    correlation_id: "X-Correlation-ID"
  error_handling: "RFC 7807 Problem Details"

maturity: draft
