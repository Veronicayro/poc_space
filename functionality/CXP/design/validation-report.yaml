    status: DESIGNED
    mechanism: "ADR-CXP-003; RBAC middleware; mTLS para banking; HMAC-SHA256 webhooks"

  observability:
    target: "OpenTelemetry + Prometheus + structured logging"
    status: DESIGNED
    mechanism: "Definido en todos los component.yaml; X-Correlation-ID propagado"

  reliability:
    target: "Retry policies + circuit breakers"
    status: DESIGNED
    mechanism: "Circuit breaker en erp-integration-api y banking-integration-api"

  compliance:
    target: "ISO 27001 / SOX readiness"
    status: DESIGNED
