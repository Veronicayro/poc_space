openapi: 3.0.3
info:
  title: Invoice Management API
  description: >
    Business API for supplier invoice lifecycle management: registration,
    validation, approval/rejection and cancellation.
    BIAN alignment: AccountsReceivable (semantic_alignment – InvoiceLifecycleProcedure).
    Generated by: GitHub Copilot – Claude Sonnet 4.6
  version: "1.0.0"

servers:
  - url: /api/v1/invoices
    description: Base path v1

tags:
  - name: invoices
    description: Invoice lifecycle management

paths:
  /invoices:
    get:
      tags: [invoices]
      operationId: listInvoices
      summary: List invoices with filters
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, APPROVED, REJECTED, SCHEDULED, PAID, CANCELLED]
        - name: supplier_id
          in: query
          schema:
            type: string
            format: uuid
        - name: from_date
          in: query
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          schema:
            type: string
            format: date
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [invoices]
      operationId: createInvoice
      summary: Register a new supplier invoice
      description: >
        Validates supplier existence (ERP), prevents duplicates (supplier_id + invoice_number),
        and persists invoice in PENDING state. Business rules: BR-001, BR-002, BR-003.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceRequest"
      responses:
        "201":
          description: Invoice created in PENDING state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceResponse"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /invoices/{id}:
    get:
      tags: [invoices]
      operationId: getInvoice
      summary: Get invoice by ID
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
      responses:
        "200":
          description: Invoice detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [invoices]
      operationId: updateInvoice
      summary: Update invoice (allowed only in PENDING state)
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInvoiceRequest"
      responses:
        "200":
          description: Invoice updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceResponse"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /invoices/{id}/approve:
    post:
      tags: [invoices]
      operationId: approveInvoice
      summary: Approve invoice (PENDING → APPROVED)
      description: "BR-004: only PENDING invoices. BR-005: actor + timestamp recorded."
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowActionRequest"
      responses:
        "200":
          description: Invoice approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceResponse"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /invoices/{id}/reject:
    post:
      tags: [invoices]
      operationId: rejectInvoice
      summary: Reject invoice (PENDING → REJECTED)
      description: "BR-004: only PENDING invoices. Reason is required."
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowActionRequest"
      responses:
        "200":
          description: Invoice rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceResponse"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /invoices/{id}/cancel:
    post:
      tags: [invoices]
      operationId: cancelInvoice
      summary: Cancel invoice
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowActionRequest"
      responses:
        "200":
          description: Invoice cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceResponse"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

components:
  parameters:
    InvoiceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    NotFound:
      description: Not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    Conflict:
      description: Duplicate invoice
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    UnprocessableEntity:
      description: Business rule or validation error
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

  schemas:
    InvoiceStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED, SCHEDULED, PAID, CANCELLED]

    CreateInvoiceRequest:
      type: object
      required: [supplier_id, invoice_number, amount, currency, issue_date, due_date]
      properties:
        supplier_id:
          type: string
          format: uuid
        invoice_number:
          type: string
          maxLength: 100
        amount:
          type: number
          format: double
          minimum: 0.01
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        issue_date:
          type: string
          format: date
        due_date:
          type: string
          format: date

    UpdateInvoiceRequest:
      type: object
      properties:
        amount:
          type: number
          format: double
          minimum: 0.01
        due_date:
          type: string
          format: date

    WorkflowActionRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 500

    InvoiceResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        supplier_id:
          type: string
          format: uuid
        invoice_number:
          type: string
        amount:
          type: number
          format: double
        currency:
          type: string
        status:
          $ref: "#/components/schemas/InvoiceStatus"
        issue_date:
          type: string
          format: date
        due_date:
          type: string
          format: date
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    InvoiceListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceResponse"
        total:
          type: integer
        cursor:
          type: string
          nullable: true

    ProblemDetails:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        error_code:
          type: string
        trace_id:
          type: string
