business_cases:
  - id: BC-001
    name: "Registro de Factura de Proveedor"
    description: >
      El Analista Financiero registra una factura de proveedor, validando
      que el proveedor exista y que no haya duplicados por número de factura.
    actors: [ANALYST]
    desired_outcomes:
      - Factura registrada en estado PENDING
      - Proveedor validado contra ERP
      - Duplicados prevenidos
    user_stories: [HU-CXP-001]

  - id: BC-002
    name: "Aprobación / Rechazo de Factura"
    description: >
      El Gerente Financiero revisa y aprueba o rechaza facturas en estado PENDING,
      dejando trazabilidad de usuario y timestamp.
    actors: [MANAGER]
    desired_outcomes:
      - Factura transicionada a APPROVED o REJECTED
      - Audit trail con usuario y timestamp
    user_stories: [HU-CXP-002]

  - id: BC-003
    name: "Programación y Ejecución de Pago"
    description: >
      El Tesorero programa la fecha de pago de facturas APPROVED y el sistema
      ejecuta el pago mediante integración bancaria.
    actors: [TREASURER]
    desired_outcomes:
      - Factura transicionada a SCHEDULED y luego PAID
      - Orden de pago enviada al sistema bancario
      - Confirmación bancaria recibida vía webhook
    user_stories: [HU-CXP-003]

