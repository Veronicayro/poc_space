openapi: 3.0.3
info:
  title: Accounts Payable Experience API
  description: >
    BFF (Backend for Frontend) for the Accounts Payable system.
    Exposes aggregated REST endpoints for the React SPA with per-role RBAC enforcement.
    Generated by: GitHub Copilot – Claude Sonnet 4.6
  version: "1.0.0"
  contact:
    name: CXP-GHCopilot-Sonnet46 Architecture

servers:
  - url: /api/v1/accounts-payable
    description: Base path v1

security:
  - bearerAuth: []

tags:
  - name: invoices
    description: Supplier invoice management
  - name: payments
    description: Payment scheduling and status

paths:
  /invoices:
    get:
      tags: [invoices]
      operationId: listInvoices
      summary: List invoices with filters
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, APPROVED, REJECTED, SCHEDULED, PAID, CANCELLED]
        - name: supplier_id
          in: query
          schema:
            type: string
            format: uuid
        - name: from_date
          in: query
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          schema:
            type: string
            format: date
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Invoice list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    post:
      tags: [invoices]
      operationId: createInvoice
      summary: Register a new supplier invoice
      description: "Required role: ANALYST"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceRequest"
      responses:
        "201":
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceResponse"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /invoices/{id}:
    get:
      tags: [invoices]
      operationId: getInvoice
      summary: Get invoice detail
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
      responses:
        "200":
          description: Invoice detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [invoices]
      operationId: updateInvoice
      summary: Edit invoice (PENDING state only)
      description: "Required role: ANALYST"
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInvoiceRequest"
      responses:
        "200":
          description: Invoice updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceResponse"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /invoices/{id}/approve:
    post:
      tags: [invoices]
      operationId: approveInvoice
      summary: Approve invoice
      description: "Required role: MANAGER. Invoice must be in PENDING state."
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActionCommentRequest"
      responses:
        "200":
          description: Invoice approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceResponse"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /invoices/{id}/reject:
    post:
      tags: [invoices]
      operationId: rejectInvoice
      summary: Reject invoice
      description: "Required role: MANAGER. Rejection reason is required."
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActionCommentRequest"
      responses:
        "200":
          description: Invoice rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceResponse"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /invoices/{id}/cancel:
    post:
      tags: [invoices]
      operationId: cancelInvoice
      summary: Cancel invoice
      description: "Required role: ANALYST or MANAGER."
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActionCommentRequest"
      responses:
        "200":
          description: Invoice cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceResponse"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /invoices/{id}/schedule-payment:
    post:
      tags: [payments]
      operationId: schedulePayment
      summary: Schedule payment for an approved invoice
      description: "Required role: TREASURER. Invoice must be APPROVED."
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SchedulePaymentRequest"
      responses:
        "201":
          description: Payment scheduled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentOrderResponse"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /payments:
    get:
      tags: [payments]
      operationId: listPayments
      summary: List payment orders
      description: "Required role: TREASURER or MANAGER."
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [CREATED, SENT, CONFIRMED, FAILED, CANCELLED]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Payment list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentListResponse"

  /payments/{id}:
    get:
      tags: [payments]
      operationId: getPayment
      summary: Get payment order detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Payment detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentOrderResponse"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    InvoiceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Unauthorized – missing or invalid token
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    Forbidden:
      description: Forbidden – insufficient role
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    Conflict:
      description: Conflict – duplicate resource
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    UnprocessableEntity:
      description: Validation or business rule error
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

  schemas:
    InvoiceStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED, SCHEDULED, PAID, CANCELLED]

    CreateInvoiceRequest:
      type: object
      required: [supplier_id, invoice_number, amount, currency, issue_date, due_date]
      properties:
        supplier_id:
          type: string
          format: uuid
        invoice_number:
          type: string
          maxLength: 100
        amount:
          type: number
          format: double
          minimum: 0.01
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        issue_date:
          type: string
          format: date
        due_date:
          type: string
          format: date

    UpdateInvoiceRequest:
      type: object
      properties:
        amount:
          type: number
          format: double
          minimum: 0.01
        due_date:
          type: string
          format: date

    ActionCommentRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 500

    SchedulePaymentRequest:
      type: object
      required: [scheduled_date]
      properties:
        scheduled_date:
          type: string
          format: date
          description: "Payment date – must be >= today"

    InvoiceResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        supplier_id:
          type: string
          format: uuid
        invoice_number:
          type: string
        amount:
          type: number
          format: double
        currency:
          type: string
        status:
          $ref: "#/components/schemas/InvoiceStatus"
        issue_date:
          type: string
          format: date
        due_date:
          type: string
          format: date
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    InvoiceListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceResponse"
        pagination:
          $ref: "#/components/schemas/PaginationMeta"

    PaymentOrderResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        invoice_id:
          type: string
          format: uuid
        scheduled_date:
          type: string
          format: date
        execution_date:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [CREATED, SENT, CONFIRMED, FAILED, CANCELLED]
        idempotency_key:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    PaymentListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PaymentOrderResponse"
        pagination:
          $ref: "#/components/schemas/PaginationMeta"

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        cursor:
          type: string
          nullable: true

    ProblemDetails:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        trace_id:
          type: string
