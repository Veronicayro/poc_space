schema_version: "1.0"
functionality_id: CXP-GHCopilot-Sonnet46
component_name: erp-integration-api
component_type: api
layer: support
decision: create
phase: backend-component-design
generated_at: "2026-06-17"

purpose: >
  Anti-Corruption Layer (ACL) that isolates the domain from ERP integration
  details. Handles supplier validation lookups and accounting entry registration,
  with retry logic and circuit breaker for ERP resilience.

owner_scope: "Integration Architecture – ERP Adapter"

bian:
  aligned: true
  release: "14"
  selected_service_domain: FinancialAccounting
  alignment_type: partial
  adoption_file: design/bian/bian-release14-source-index.yaml

responsibilities:
  - Validate supplier existence and active status in ERP
  - Register accounting entries (LedgerPosting) in ERP after payment execution
  - Transform internal models to ERP external schema (DTO ↔ ERP Schema)
  - Implement retry with exponential backoff (max 3) for ERP calls
  - Expose circuit breaker state for observability

non_responsibilities:
  - Business rule validation (delegated to invoice-management-api)
  - Payment execution (delegated to banking-integration-api)
  - State machine management

dependencies:
  synchronous:
    - "ERP (external – REST API)"
  asynchronous:
    publishes: []
    consumes: []

consumers:
  - invoice-management-api
  - payment-management-api

state_owner_if_any: null

data_ownership:
  owns_persistent_data: true
  persistence_model: >
    PostgreSQL table: erp_request_log (id, operation, request_payload, response_status,
    retries, created_at) for audit and retry tracking.

cache_usage:
  uses_cache: true
  cache_model: "Supplier validation cache (TTL: 5 minutes) to reduce ERP calls"

events:
  publishes: []
  consumes: []

endpoints:
  - method: GET
    path: /api/v1/erp/suppliers/{supplierId}/validate
    description: "Validate supplier is active in ERP"
    caching: "5 min TTL on supplierId"

  - method: POST
    path: /api/v1/erp/accounting/entries
    description: "Post accounting entry to ERP ledger"

external_system:
  id: ERP
  integration_type: "REST API / Batch Sync"
  auth: "OAuth2 client_credentials"
  transport: "TLS 1.2+"

resilience:
  retry:
    enabled: true
    max_retries: 3
    backoff: exponential
    initial_delay_ms: 500
  circuit_breaker:
    enabled: true
    failure_threshold: 5
    timeout_seconds: 30

nfrs:
  performance_sla_ms: 300
  observability:
    tracing: "OpenTelemetry"
    metrics: "Prometheus (erp_calls_total, erp_errors_total)"
    logging: "Structured JSON"
  reliability:
    circuit_breaker: true
    retry: true
    supplier_cache: true

status: draft
