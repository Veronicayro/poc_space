statuses:
  - name: PaymentOrderStatus
    values:
      - CREATED: "Payment order created, pending bank confirmation"
      - SENT: "Payment order sent to banking system"
      - CONFIRMED: "Payment confirmed by banking webhook"
      - FAILED: "Payment failed; retry or manual review required"
      - CANCELLED: "Payment order cancelled before execution"

lifecycle_states:
  - entity: Invoice
    states:
      - PENDING: "Invoice registered, awaiting approval"
      - APPROVED: "Invoice approved by Financial Manager"
      - REJECTED: "Invoice rejected; not eligible for payment"
      - SCHEDULED: "Payment scheduled with a defined execution date"
      - PAID: "Payment executed and confirmed by banking system"
      - CANCELLED: "Invoice cancelled before payment"
    transitions:
      - from: PENDING
        to: APPROVED
        actor: MANAGER
        rule: BR-004
      - from: PENDING
        to: REJECTED
        actor: MANAGER
        rule: BR-004
      - from: APPROVED
        to: SCHEDULED
        actor: TREASURER
        rule: BR-006
      - from: SCHEDULED
        to: PAID
        actor: SYSTEM
        trigger: banking_webhook_confirmed
      - from: [PENDING, APPROVED, SCHEDULED]
        to: CANCELLED
        actor: MANAGER
        note: "Cannot cancel PAID or REJECTED invoices"

