---
# Context Pack: Digital KYC Onboarding
# Generated by: target-architecture-design agent (Phase 1)
# Date: 2026-06-25

metadata:
  functionality_id: DKO-Sonnet46-DigitalKYC-v1
  functionality_name: Digital KYC Onboarding
  bian_alignment_status: aligned
  domain_standard: BIAN Release 14.0.0
  execution_mode: minimal

# =============================================================================
# SECTION 1: USE CASES & BUSINESS CONTEXT (inline from prompt)
# =============================================================================

business_summary: >
  Design a digital onboarding solution for bank customers. The solution must support
  customer registration, identity verification, AML validation, manual review, and
  customer notification.

use_cases:
  - id: UC-001
    name: Customer Registration
    actor: Customer
    description: >
      Customer initiates digital onboarding by providing basic registration data
      (name, email, phone, address). System validates format and creates a draft
      party reference record.
    preconditions:
      - Customer has not been onboarded
      - Customer accepts Terms & Conditions
    postconditions:
      - Party reference record created in draft state
      - Unique customer ID (CIF) assigned
      - KYC lifecycle initiated

  - id: UC-002
    name: Identity Verification
    actor: Customer, System
    description: >
      Customer submits identity documents (ID card, passport, selfie). System performs
      document validation and biometric verification. Results stored in party lifecycle
      state.
    preconditions:
      - UC-001 completed (customer registered)
    postconditions:
      - Identity verification status recorded
      - If passed: advances to UC-003 (AML validation)
      - If failed: customer notified, manual review escalated

  - id: UC-003
    name: AML / KYC Screening
    actor: System, KYC Analyst
    description: >
      System invokes KYC/AML screening against PEP, sanctions, and watchlists.
      Generates screening result with risk score and matches. If high-risk or matches,
      escalates to KYC Analyst for manual review.
    preconditions:
      - UC-002 completed (identity verified)
    postconditions:
      - Screening result recorded in party lifecycle
      - If pass: customer advances to completion
      - If escalation: case assigned to KYC Analyst

  - id: UC-004
    name: Manual Review & Approval
    actor: KYC Analyst
    description: >
      KYC Analyst reviews escalated cases (failed identity, high-risk AML hits).
      Analyst makes approve/reject decision and records justification. Decision
      propagates to customer notification.
    preconditions:
      - UC-003 escalated (high-risk or matches detected)
    postconditions:
      - KYC lifecycle state updated (approved / rejected / suspended)
      - Customer notified of outcome
      - Audit trail recorded

  - id: UC-005
    name: Customer Notification
    actor: System, Customer
    description: >
      System notifies customer of onboarding status at key milestones:
      registration confirmed, identity verified, approval/rejection, suspension.
      Notifications via email, SMS, and in-app channel.
    preconditions:
      - Any state transition in UC-001 through UC-004
    postconditions:
      - Customer informed via selected channel
      - Delivery status tracked
      - Notification logged for audit

business_rules:
  - rule: "Mandatory Identity Verification"
    description: "All customers must complete identity verification before AML screening."
    
  - rule: "AML Screening Before Onboarding Complete"
    description: "No customer can complete onboarding without passing AML screening."
    
  - rule: "Manual Review SLA"
    description: "KYC Analyst must review escalated cases within 2 business days."
    
  - rule: "Immutable Audit Trail"
    description: "All onboarding decisions and state transitions must be logged immutably (WORM)."
    
  - rule: "Dual Control for Rejection"
    description: "Rejection of customer must be approved by two KYC Analysts if risk score > 85."

# =============================================================================
# SECTION 2: ENTERPRISE CAPABILITIES MAPPED (from Copilot Space alignment)
# =============================================================================

capabilities_aligned:
  - capability_id: CAP-PARTY-001
    capability_name: Customer Profile & Master Data
    bian_sd: PartyReferenceDataDirectory
    coverage: partial
    rationale: >
      Digital onboarding creates and maintains customer profile data (demographics,
      contacts, addresses) in party reference data. Aligns with PartyReferenceDataDirectory
      for master data management.

  - capability_id: CAP-PARTY-002
    capability_name: Customer Identity & Lifecycle Verification
    bian_sd: PartyLifecycleManagement
    coverage: aligned
    rationale: >
      Core capability: Identity verification and KYC lifecycle tracking from initial
      document submission through regulatory compliance. Direct match with
      PartyLifecycleManagement SD operations (Initiate, Retrieve, Update).

  - capability_id: CAP-COMP-001
    capability_name: KYC / AML Screening
    bian_sd: PartyLifecycleManagement
    coverage: partial
    rationale: >
      KYC/AML screening is a specialized operation within the party lifecycle. Screened
      via GuidelineCompliance and PartyLifecycleManagement for regulatory checks.
      Manual review case management belongs to Compliance domain.

  - capability_id: CAP-CHAN-002
    capability_name: Multichannel Notification Dispatch
    bian_sd: Correspondence (secondary mapping)
    coverage: no-match-in-bian
    rationale: >
      BIAN Correspondence modela batch formal correspondence, not real-time push/SMS.
      Notification dispatch for onboarding status is a channel support capability
      (email, SMS, in-app) outside BIAN scope.

# =============================================================================
# SECTION 3: BIAN SERVICE DOMAINS SELECTED (from Copilot Space governance)
# =============================================================================

domain_standard_alignment:
  selected: true
  name: BIAN Release 14.0.0
  rationale: >
    BIAN Release 14 mandatory per repository governance. Digital KYC Onboarding
    aligns with Party Management (PartyLifecycleManagement, PartyReferenceDataDirectory)
    and Compliance (GuidelineCompliance) Service Domains.

selected_service_domains:
  - sd_id: PartyLifecycleManagement
    sd_name: Party Lifecycle Management
    bian_description: >
      Tracks the state of a party relationship from initial checks (KYC, AML,
      regulatory compliance) through the full duration of the relationship.
    primary_operations:
      - Initiate (start KYC lifecycle)
      - Retrieve (get party state)
      - Update (record screening results, approval)
      - Query (list pending reviews)
    mapping_rationale: >
      Identity verification, AML screening, and lifecycle state transitions
      map directly to PartyLifecycleManagement operations.
    evidence_source: "Copilot Space: catalog/bian-capability-alignment.yaml (CAP-PARTY-002)"

  - sd_id: PartyReferenceDataDirectory
    sd_name: Party Reference Data Directory
    bian_description: >
      Maintains party reference information: general reference details, contacts,
      associations and demographic information.
    primary_operations:
      - Create (register customer)
      - Retrieve (get profile)
      - Update (modify demographics)
    mapping_rationale: >
      Customer registration and profile management during onboarding aligns with
      party reference data operations.
    evidence_source: "Copilot Space: catalog/bian-capability-alignment.yaml (CAP-PARTY-001)"

  - sd_id: GuidelineCompliance
    sd_name: Guideline Compliance
    bian_description: >
      Provides guidance and tests for compliance with internal policies and external
      regulatory requirements.
    primary_operations:
      - Evaluate (run AML/KYC screening tests)
      - Report (generate compliance results)
    mapping_rationale: >
      AML/KYC screening execution and compliance rule application map to
      GuidelineCompliance operations.
    evidence_source: "Copilot Space: catalog/bian-capability-index.yaml (keyword: 'aml', 'kyc')"

non_aligned_capabilities:
  - capability_id: CAP-CHAN-002
    reason: >
      Multichannel notification dispatch (push/SMS real-time) has no BIAN Service Domain.
      Treat as proprietary channel support capability. No derivation needed.

# =============================================================================
# SECTION 4: NON-FUNCTIONAL REQUIREMENTS (from prompt)
# =============================================================================

non_functional_requirements:
  - id: NFR-001
    category: Security
    requirement: OAuth2 / OIDC
    description: >
      All APIs must use OAuth2 / OIDC for authentication and authorization.
      Stateless, secure token-based access control.
    priority: Tier 0
    
  - id: NFR-002
    category: Security
    requirement: RBAC
    description: >
      Role-Based Access Control enforced per operation:
      - Customer: register, view own profile, provide documents
      - KYC Analyst: review escalated cases, approve/reject, audit trail access
      - System: screening invocation, notifications
    priority: Tier 0
    
  - id: NFR-003
    category: Security
    requirement: TLS 1.2+
    description: >
      All API traffic encrypted with TLS 1.2 minimum. TLS 1.3 preferred.
    priority: Tier 0
    
  - id: NFR-004
    category: Compliance
    requirement: Auditability
    description: >
      Immutable append-only audit trail (WORM) for all onboarding decisions,
      state transitions, and KYC Analyst actions. Supports regulatory audits.
    priority: Tier 0
    
  - id: NFR-005
    category: Availability
    requirement: High Availability
    description: >
      99.95% uptime SLA. Geographic redundancy, failover, and multi-region deployment.
      KYC screening critical path < 2s latency.
    priority: Tier 0

# =============================================================================
# SECTION 5: INTEGRATIONS & EXTERNAL DEPENDENCIES
# =============================================================================

external_integrations:
  - integration_id: INT-001
    name: KYC/AML Screening Service
    type: synchronous-rest
    description: >
      Third-party or internal service providing real-time KYC/AML screening against
      PEP, sanctions, and watchlists. Returns risk score and match details.
    expected_latency_ms: 1000
    
  - integration_id: INT-002
    name: Identity Verification (Biometric)
    type: synchronous-rest
    description: >
      Third-party biometric verification service (liveness detection, facial recognition).
      Validates identity documents and selfies.
    expected_latency_ms: 2000
    
  - integration_id: INT-003
    name: Notification Service
    type: asynchronous-event
    description: >
      Internal notification service for email, SMS, and in-app push delivery.
      Produces notification events (email_sent, sms_delivered, in_app_shown).
    protocol: AsyncAPI / Event Bus

# =============================================================================
# SECTION 6: ACTOR ROLES & RESPONSIBILITIES
# =============================================================================

actors:
  - actor_id: Actor-001
    name: Customer
    description: >
      End-user initiating digital onboarding. Provides registration data, identity
      documents, and consents. Receives notifications of onboarding status.
    responsibilities:
      - Register profile
      - Submit identity documents
      - Complete biometric verification
      - Accept regulatory notices
      - Review onboarding notifications

  - actor_id: Actor-002
    name: KYC Analyst
    description: >
      Back-office compliance officer reviewing escalated onboarding cases.
      Makes approve/reject decisions on high-risk customers.
    responsibilities:
      - Review escalated cases
      - Analyze identity and AML screening results
      - Make approval/rejection decisions (with justification)
      - Record dual-control approvals when risk score > 85
      - Access immutable audit trail

  - actor_id: Actor-003
    name: System
    description: >
      Automated orchestration and rule engine executing onboarding workflows.
    responsibilities:
      - Validate input data
      - Invoke identity verification and AML screening services
      - Route cases to manual review when needed
      - Send notifications
      - Maintain immutable audit trail

# =============================================================================
# SECTION 7: CONSTRAINTS & ASSUMPTIONS
# =============================================================================

constraints:
  - constraint: >
      All APIs must align with BIAN Release 14 Service Domain semantics
      (PartyLifecycleManagement, PartyReferenceDataDirectory, GuidelineCompliance).
  - constraint: >
      Notification capability (CAP-CHAN-002) is out of BIAN scope; treat as
      proprietary channel support.
  - constraint: >
      Manual review workflow (KYC Analyst) requires stateful case management
      outside BIAN scope; implement as custom domain capability.

assumptions:
  - assumption: >
      Identity verification and KYC/AML screening services are available via
      REST APIs with < 2s latency.
  - assumption: >
      Notification service supports email, SMS, and in-app channels.
  - assumption: >
      Customer CIF (unique identifier) is generated by upstream party
      reference system or embedded in PartyReferenceDataDirectory.

