functionality_id: KYC_ONBOARDING_DIGITAL
version: "1.0.0"
generated_at: "2026-06-22"

business_cases:
  - business_case_id: BC-001
    name: "Digital Customer Onboarding"
    description: >
      Proceso end-to-end de incorporación digital de un nuevo cliente al banco:
      registro, carga de documentos, validación KYC/AML y notificación del resultado.
    actors: [CUSTOMER, KYC_ANALYST, SYSTEM]
    desired_outcomes:
      - "Cliente identificado y validado digitalmente en < 5 minutos (happy path)"
      - "Cumplimiento normativo AML/KYC garantizado en cada apertura"
      - "Reducción de fricción en el alta de clientes"
      - "Trazabilidad completa y auditable de cada caso de onboarding"

enterprise_capabilities:
  - capability_id: CAP-001
    capability_name: "Party Digital Registration"
    capability_type: business
    description: >
      Captura, validación y almacenamiento de datos personales y documentos de identidad
      del cliente durante el proceso de onboarding digital.
    mapped_business_cases: [BC-001]
    parent_capability: CAP-004
    capability_owner_scope: "Customer Platform / KYC Squad"
    source_references:
      - "functionality/KYC_ONBOARDING_DIGITAL/discovery/use-cases.yaml#UC-001"
      - "functionality/KYC_ONBOARDING_DIGITAL/discovery/use-cases.yaml#UC-002"

  - capability_id: CAP-002
    capability_name: "KYC Validation & AML Compliance"
    capability_type: business
    description: >
      Ejecución automática de validaciones KYC: verificación de identidad contra
      proveedor externo, screening AML/PEP y emisión del resultado de validación.
    mapped_business_cases: [BC-001]
    parent_capability: CAP-004
    capability_owner_scope: "Financial Crime (FCC) Squad"
    source_references:
      - "functionality/KYC_ONBOARDING_DIGITAL/discovery/use-cases.yaml#UC-003"
      - "functionality/KYC_ONBOARDING_DIGITAL/discovery/business-rules.yaml#BR-003"

  - capability_id: CAP-003
    capability_name: "Case Review & Decision"
    capability_type: business
    description: >
      Gestión de la cola de revisión manual para casos cuya validación automática
      falló o es inconclusa. Incluye la interfaz del analista KYC para revisar
      evidencia y emitir una decisión final (APPROVED / REJECTED).
    mapped_business_cases: [BC-001]
    parent_capability: CAP-004
    capability_owner_scope: "Financial Crime (FCC) Squad"
    source_references:
      - "functionality/KYC_ONBOARDING_DIGITAL/discovery/use-cases.yaml#UC-004"
      - "functionality/KYC_ONBOARDING_DIGITAL/discovery/business-rules.yaml#BR-004"

  - capability_id: CAP-004
    capability_name: "Onboarding Lifecycle Management"
    capability_type: business
    description: >
      Orquestación del ciclo de vida completo del caso de onboarding digital:
      gestión de estado (INITIATED → DOCS_SUBMITTED → UNDER_REVIEW → APPROVED/REJECTED),
      coordinación de capacidades subordinadas (CAP-001, CAP-002, CAP-003, CAP-005)
      y aplicación de reglas de negocio cross-cutting (BR-005, BR-006, BR-007).
    mapped_business_cases: [BC-001]
    parent_capability: null
    capability_owner_scope: "Customer Platform / KYC Squad"
    source_references:
      - "functionality/KYC_ONBOARDING_DIGITAL/discovery/use-cases.yaml"
      - "functionality/KYC_ONBOARDING_DIGITAL/discovery/business-rules.yaml"

  - capability_id: CAP-005
    capability_name: "Customer Status Notification"
    capability_type: integration
    description: >
      Emisión de notificaciones al cliente ante cambios de estado en el proceso
      de onboarding (vía NOTIFICATION_SERVICE por evento asíncrono).
    mapped_business_cases: [BC-001]
    parent_capability: CAP-004
    capability_owner_scope: "Channels / Notifications Squad"
    source_references:
      - "functionality/KYC_ONBOARDING_DIGITAL/discovery/use-cases.yaml#UC-005"

