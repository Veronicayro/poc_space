# ─── New components to create ─────────────────────────────────────────────────

new_components_to_create:
  - component_id: kyc-onboarding-api
    layer: business
    decision_rationale: >
      No existing catalog API covers the onboarding orchestration lifecycle (state machine,
      manual review workflow, cross-domain coordination). Phase 0 decision: CREATE_ANYWAY.
    target_design_phase: backend-component-design

  - component_id: kyc-onboarding-event-adapter
    layer: support
    decision_rationale: >
      Async event publication to NOTIFICATION_SERVICE is a new capability with no existing
      support component. May be implemented as an internal module of kyc-onboarding-api
      (decision deferred to solution-landscape phase).
    target_design_phase: backend-component-design
