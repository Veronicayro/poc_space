---
# Enterprise Capability Map: Digital KYC Onboarding
# Generated by: target-architecture-design agent (Phase 1)
# Date: 2026-06-25
# Knowledge source: Copilot Space (catalog/bian-capability-alignment.yaml)

metadata:
  functionality_id: KYC_ONBOARDING_DIGITAL
  generated_from: context-pack.yaml
  bian_framework_version: "14.0.0"

# =============================================================================
# ENTERPRISE CAPABILITY STRUCTURE (TOGAF 10 + BIAN R14)
# =============================================================================

capability_areas:
  - area_id: "PARTY-MGMT"
    area_name: "Party & Customer Management"
    bian_business_area: "Business Development"
    togaf_layer: "Business"
    description: >
      Gestión del ciclo de vida del cliente desde onboarding digital,
      identidad, verificación KYC y consentimientos regulatorios.

    capabilities:
      # CAP-PARTY-001: Customer Profile & Master Data
      - capability_id: CAP-PARTY-001
        capability_name: "Customer Profile & Master Data"
        bian_service_domain: PartyReferenceDataDirectory
        bian_coverage: partial
        maturity: draft
        mapped_use_cases: [UC-001]
        mapped_actors: [CUSTOMER, SYSTEM]
        description: >
          Creación y mantenimiento del perfil del cliente: datos demográficos,
          contacto, direcciones y preferencias. Fuente única de verdad (party
          reference data) durante onboarding.
        dko_mapping: >
          UC-001 (Registro de cliente digital) mapea a operaciones Create/Update
          de PartyReferenceDataDirectory.
        rationale: >
          BIAN PartyReferenceDataDirectory cubre master data de partido
          con operaciones para crear, consultar y actualizar datos demográficos.
          DKO requiere esta capacidad como paso base.
        constraints:
          - Datos personales deben estar cifrados (BR-007)
          - Validación de formatos obligatoria (BR-001)
        source: "Copilot Space: catalog/bian-capability-alignment.yaml"

      # CAP-PARTY-002: Customer Identity & Lifecycle Verification
      - capability_id: CAP-PARTY-002
        capability_name: "Customer Identity & Lifecycle Verification"
        bian_service_domain: PartyLifecycleManagement
        bian_coverage: aligned
        maturity: production
        mapped_use_cases: [UC-002, UC-003, UC-004]
        mapped_actors: [CUSTOMER, KYC_ANALYST, SYSTEM]
        description: >
          Registro y verificación de documentos de identidad, validación biométrica,
          estado SCA del cliente. Cubre ciclo de vida KYC desde onboarding hasta
          verificaciones periódicas requeridas por regulación.
        dko_mapping: >
          UC-002: Carga de documentos → PartyLifecycleManagement.Retrieve
          UC-003: Validación automática KYC → PartyLifecycleManagement.Update
          UC-004: Revisión manual → PartyLifecycleManagement.Update + custom case mgmt
        rationale: >
          PartyLifecycleManagement es el SD BIAN más específico para
          gestión de ciclo de vida KYC. Operaciones Initiate, Update, Retrieve,
          Query alinean directamente con DKO use cases.
        collision_evidence: >
          OVL-002: CustomerIdentityAPI (existente) ya cubre CAP-PARTY-002.
          DKO debe REUTILIZAR este API en Phase 2 o EXTENDER para onboarding digital.
        constraints:
          - AML obligatorio antes de onboarding completo (BR-003, BR-005)
          - Auditoría inmutable de decisiones (BR-006)
          - SLA revisión manual 2 días (BR-008)
        source: "Copilot Space: catalog/bian-capability-alignment.yaml"

  - area_id: "COMPLIANCE"
    area_name: "Compliance & Financial Crime Prevention"
    bian_business_area: "Risk & Compliance"
    togaf_layer: "Business"
    description: >
      Controles regulatorios, prevencion de lavado de activos (AML/KYC),
      screening de sanciones internacionales.

    capabilities:
      # CAP-COMP-001: KYC / AML Screening
      - capability_id: CAP-COMP-001
        capability_name: "KYC / AML Screening"
        bian_service_domain: "PartyLifecycleManagement (primary), GuidelineCompliance (secondary)"
        bian_coverage: partial
        maturity: production
        mapped_use_cases: [UC-003]
        mapped_actors: [SYSTEM, KYC_ANALYST]
        description: >
          Screening de clientes contra listas PEP, AML y vigilancia.
          Provee resultado de screening con nivel de riesgo, matches y evidencias.
          Invocado en onboarding y decisiones de revisión manual.
        dko_mapping: >
          UC-003 (Validación automática KYC) ejecuta screening AML/KYC
          invocando PartyLifecycleManagement y GuidelineCompliance.
        rationale: >
          PartyLifecycleManagement modela ciclo de vida KYC incluyendo
          validaciones de cumplimiento. GuidelineCompliance proporciona
          tests de cumplimiento regulatorio. Combinadas cubrnen screening.
        collision_evidence: >
          OVL-002: KYCScreeningAPI (existente) ya cubre screening puntual.
          DKO puede reutilizar este API como servicio de evaluación.
        constraints:
          - AML obligatorio (BR-003)
          - Resultados deben generar auditoría (BR-006)
        external_integration: INT-001 (AML_SERVICE)
        source: "Copilot Space: catalog/bian-capability-index.yaml"

  - area_id: "CHANNELS"
    area_name: "Digital Channels & Engagement"
    bian_business_area: "Customer Channels"
    togaf_layer: "Application"
    description: >
      Notificaciones multicanal del cliente sobre resultado de onboarding.

    capabilities:
      # CAP-CHAN-002: Multichannel Notification Dispatch
      - capability_id: CAP-CHAN-002
        capability_name: "Multichannel Notification Dispatch"
        bian_service_domain: null
        bian_coverage: no-match
        maturity: draft
        classification: "channel-support-capability (proprietary)"
        mapped_use_cases: [UC-005]
        mapped_actors: [SYSTEM, CUSTOMER]
        description: >
          Envío de notificaciones transaccionales de resultado onboarding
          al cliente a través de múltiples canales (push, email, SMS).
        dko_mapping: >
          UC-005 (Notificación) requiere envío multicanal.
        rationale: >
          BIAN Correspondence modela correspondencia formal batch.
          Notificaciones real-time (push/SMS/email) no tienen SD específico
          en BIAN R14. Capacidad propietaria de soporte de canal.
        treatment: "Implementar como custom channel support service (fuera BIAN)"
        external_integration: INT-003 (NOTIFICATION_SERVICE)
        source: "Copilot Space: catalog/bian-capability-index.yaml (coverage: no_match)"

# =============================================================================
# CAPABILITY TRACEABILITY TO BUSINESS
# =============================================================================

traceability:
  use_case_to_capability:
    UC-001:
      - CAP-PARTY-001 (customer profile creation)
    UC-002:
      - CAP-PARTY-002 (identity docs upload & registration)
    UC-003:
      - CAP-PARTY-002 (KYC lifecycle update)
      - CAP-COMP-001 (AML screening execution)
    UC-004:
      - CAP-PARTY-002 (lifecycle state update per analyst decision)
    UC-005:
      - CAP-CHAN-002 (notification dispatch)

  capability_to_bian_sd:
    CAP-PARTY-001: PartyReferenceDataDirectory
    CAP-PARTY-002: PartyLifecycleManagement
    CAP-COMP-001: "PartyLifecycleManagement + GuidelineCompliance"
    CAP-CHAN-002: null (out of BIAN scope)

# =============================================================================
# CAPABILITY GAPS & UNRESOLVED ITEMS
# =============================================================================

gaps:
  - gap_id: GAP-CHAN-002
    description: "Notificaciones multicanal real-time no cubiertas por BIAN R14"
    bian_sd: null
    treatment: "Custom implementation (channel-support-capability)"
    risk: LOW (can implement independently)

  - gap_id: GAP-KYC-CASE-MGMT
    description: "Gestión de casos de revisión manual no tiene SD BIAN específico"
    bian_sd: "(implicit in PartyLifecycleManagement; requires custom domain model)"
    treatment: "Extender PartyLifecycleManagement con custom case management domain"
    risk: MEDIUM (requires careful modeling)

# =============================================================================
# NEXT PHASE: Phase 2 POINTER
# =============================================================================

phase_2_pointer:
  status: PENDING
  description: "Phase 2 will invoke api-landscape-governance skill to decide:"
  decisions:
    - "For CAP-PARTY-001: REUSE CustomerProfileAPI or CREATE new KYC-specific API?"
    - "For CAP-PARTY-002: REUSE CustomerIdentityAPI or EXTEND for digital onboarding?"
    - "For CAP-COMP-001: REUSE KYCScreeningAPI as evaluator or EXTEND?"
    - "For CAP-CHAN-002: REUSE NotificationDispatchAPI or CREATE KYC-specific variant?"
  artifact: design/api-landscape.yaml
