---
# Context Pack: Digital KYC Onboarding
# Generated by: target-architecture-design agent (Phase 1)
# Date: 2026-06-25
# Knowledge source: Copilot Space (primary) + functional requirement (user input)

metadata:
  functionality_id: KYC_ONBOARDING_DIGITAL
  functionality_name: Digital KYC Onboarding
  feature: Onboarding
  bian_alignment_status: aligned
  domain_standard: BIAN Release 14.0.0
  execution_mode: standard
  technology: Java
  target_component: kyc-onboarding-api

# =============================================================================
# SECTION 1: USE CASES & BUSINESS REQUIREMENTS (from functional requirement)
# =============================================================================

use_cases:
  - id: UC-001
    name: Registro de cliente digital
    actor: CUSTOMER
    description: >
      Cliente registra información personal (nombre, email, teléfono, dirección).
      Sistema valida datos y crea registro de referencia de partido (party reference)
      en estado draft. Se asigna CIF único.
    preconditions:
      - Cliente no ha sido onboarded anteriormente
    postconditions:
      - Registro de referencia creado
      - CIF asignado
      - Ciclo de vida KYC iniciado

  - id: UC-002
    name: Carga de documentos
    actor: CUSTOMER
    description: >
      Cliente carga documentos de identidad (cédula, pasaporte, selfie).
      Sistema valida formato y disponibilidad de documentos.
    preconditions:
      - UC-001 completado
    postconditions:
      - Documentos registrados para validación
      - Pendiente validación automática

  - id: UC-003
    name: Validación automática KYC
    actor: SYSTEM
    description: >
      Sistema ejecuta validaciones automáticas:
      - Verificación de documentos (ID_VERIFICATION_PROVIDER)
      - Validación AML contra listas PEP/sanciones (AML_SERVICE)
      Sistema genera resultado (aprobado/rechazado).
    preconditions:
      - UC-002 completado
    postconditions:
      - Resultado de validación registrado
      - Si aprobado: onboarding completado
      - Si rechazado o alto riesgo: escalada a revisión manual

  - id: UC-004
    name: Revisión manual
    actor: KYC_ANALYST
    description: >
      KYC Analyst revisa casos escalados (fallos, alto riesgo).
      Realiza análisis documental y toma decisión (aprobado/rechazado).
      Registra justificación (mandatory).
    preconditions:
      - UC-003 generó rechazo o riesgo alto
    postconditions:
      - Decisión registrada
      - Estado KYC actualizado
      - Cliente notificado
      - Auditoría inmutable generada

  - id: UC-005
    name: Notificación
    actor: SYSTEM
    description: >
      Sistema notifica cliente de resultado onboarding:
      - Registro confirmado
      - Validación completada
      - Aprobado/rechazado
      Canales: email, SMS, push (Web/Mobile).
    preconditions:
      - Completado UC-001 a UC-004
    postconditions:
      - Cliente informado
      - Entrega de notificación registrada

business_rules:
  - rule_id: BR-001
    description: Todos los datos obligatorios deben completarse para registrar cliente
    
  - rule_id: BR-002
    description: Los documentos deben estar vigentes
    
  - rule_id: BR-003
    description: Validación AML es obligatoria antes de onboarding completo
    
  - rule_id: BR-004
    description: Casos fallidos pasan a revisión manual
    
  - rule_id: BR-005
    description: No existe onboarding sin KYC aprobado
    
  - rule_id: BR-006
    description: Todas las validaciones generan auditoría inmutable (WORM)
    
  - rule_id: BR-007
    description: Datos personales deben almacenarse cifrados (encryption at rest)
    
  - rule_id: BR-008
    description: SLA de revisión manual: 2 días hábiles máximo

# =============================================================================
# SECTION 2: ENTERPRISE CAPABILITIES MAPPED (from Copilot Space)
# =============================================================================

capabilities_aligned:
  - capability_id: CAP-PARTY-001
    capability_name: Customer Profile & Master Data
    bian_sd: PartyReferenceDataDirectory
    bian_coverage: partial
    mapped_use_cases: [UC-001]
    rationale: >
      Registro de cliente y perfil (datos demográficos, contacto, direcciones)
      mapean a PartyReferenceDataDirectory (master data de partido).
    source: "Copilot Space: catalog/bian-capability-alignment.yaml (CAP-PARTY-001)"

  - capability_id: CAP-PARTY-002
    capability_name: Customer Identity & Lifecycle Verification
    bian_sd: PartyLifecycleManagement
    bian_coverage: aligned
    mapped_use_cases: [UC-002, UC-003, UC-004]
    rationale: >
      Verificación de identidad, validación AML, y gestión del ciclo de vida KYC
      son operaciones del SD PartyLifecycleManagement. Match exacto.
      Operaciones BIAN: Initiate (UC-001), Update (UC-003, UC-004), Retrieve (UC-004).
    source: "Copilot Space: catalog/bian-capability-alignment.yaml (CAP-PARTY-002)"

  - capability_id: CAP-COMP-001
    capability_name: KYC / AML Screening
    bian_sd: PartyLifecycleManagement (primary), GuidelineCompliance (secondary)
    bian_coverage: partial
    mapped_use_cases: [UC-003]
    rationale: >
      Screening AML/KYC ejecutado por PartyLifecycleManagement (operación de ciclo de vida)
      y GuidelineCompliance (tests de cumplimiento regulatorio).
    source: "Copilot Space: catalog/bian-capability-index.yaml (keyword_lookup: aml, kyc)"

  - capability_id: CAP-CHAN-002
    capability_name: Multichannel Notification Dispatch
    bian_sd: null
    bian_coverage: no-match
    mapped_use_cases: [UC-005]
    rationale: >
      Notificaciones real-time (push/SMS/email) no tienen SD en BIAN R14.
      BIAN Correspondence modela correspondencia batch formal.
      Notificaciones de onboarding son capacidad propietaria de canal.
    classification: "channel-support-capability (proprietary)"
    source: "Copilot Space: catalog/bian-capability-index.yaml (coverage: no_match)"

# =============================================================================
# SECTION 3: BIAN SERVICE DOMAINS SELECTED
# =============================================================================

domain_standard_alignment:
  selected: true
  standard_name: BIAN Release 14.0.0
  rationale: >
    BIAN Release 14 obligatorio por gobernanza del repositorio.
    DKO aligns directly con Party Management y Compliance SDs.

selected_service_domains:
  - id: PartyLifecycleManagement
    name: Party Lifecycle Management
    bian_description: >
      Tracks the state of a party relationship from initial checks (KYC, AML,
      regulatory compliance) through the full duration of the relationship.
    primary_operations:
      - Initiate: Iniciar ciclo de vida KYC (UC-001)
      - Update: Registrar resultados de validación (UC-003, UC-004)
      - Retrieve: Obtener estado party (UC-004)
      - Query: Listar casos pendientes de revisión
    mapping_to_dko: >
      Verificación de identidad (UC-002), validación AML (UC-003),
      revisión manual (UC-004), y actualización de estado KYC mapean
      directamente a operaciones de ciclo de vida de PartyLifecycleManagement.
    evidence: "Copilot Space: catalog/bian-capability-alignment.yaml (CAP-PARTY-002)"

  - id: PartyReferenceDataDirectory
    name: Party Reference Data Directory
    bian_description: >
      Maintains party reference information: general reference details,
      contacts, associations and demographic information.
    primary_operations:
      - Create: Crear registro de cliente (UC-001)
      - Retrieve: Obtener datos de cliente
      - Update: Actualizar perfil durante onboarding
    mapping_to_dko: >
      Registro de cliente y datos demográficos (UC-001) mapean a
      operaciones de dato maestro de PartyReferenceDataDirectory.
    evidence: "Copilot Space: catalog/bian-capability-alignment.yaml (CAP-PARTY-001)"

  - id: GuidelineCompliance
    name: Guideline Compliance
    bian_description: >
      Provides guidance and tests for compliance with internal policies
      and external regulatory requirements.
    primary_operations:
      - Evaluate: Ejecutar tests de cumplimiento (AML/KYC screening)
      - Report: Generar reportes de compliance
    mapping_to_dko: >
      Screening AML/KYC invoca tests de cumplimiento regulatorio
      desde GuidelineCompliance (UC-003).
    evidence: "Copilot Space: catalog/bian-capability-index.yaml (bian_sd_to_capability)"

out_of_bian_scope:
  - capability: CAP-CHAN-002 (Multichannel Notification)
    reason: "No BIAN SD cubre notificaciones real-time de canal"
    treatment: "Implementar como soporte de canal propietario"

# =============================================================================
# SECTION 4: NON-FUNCTIONAL REQUIREMENTS
# =============================================================================

nfr:
  security:
    - id: NFR-SEC-001
      requirement: OAuth2 / OIDC
      description: Autenticación stateless con tokens seguros
      priority: Tier 0
      applies_to: [all-apis]
      
    - id: NFR-SEC-002
      requirement: RBAC
      description: >
        Control de acceso por rol: CUSTOMER (registrar, cargar docs),
        KYC_ANALYST (revisar, decidir), SYSTEM (validaciones)
      priority: Tier 0
      
    - id: NFR-SEC-003
      requirement: TLS 1.2+
      description: Encriptación de tráfico mínimo TLS 1.2, preferible 1.3
      priority: Tier 0
      
    - id: NFR-SEC-004
      requirement: Encryption at Rest
      description: Datos personales cifrados en almacenamiento
      priority: Tier 0

  performance:
    - id: NFR-PERF-001
      requirement: Latencia máxima
      value: 2 segundos
      applies_to: [kyc-screening, id-verification]
      priority: Tier 0
      
    - id: NFR-PERF-002
      requirement: Throughput
      value: 500 req/s
      priority: Tier 1

  observability:
    - id: NFR-OBS-001
      requirement: Logging
      description: Registro de eventos operacionales y de auditoría
      priority: Tier 0
      
    - id: NFR-OBS-002
      requirement: Tracing distribuido
      description: Trazabilidad end-to-end de request por trace ID
      priority: Tier 1
      
    - id: NFR-OBS-003
      requirement: Métricas
      description: Exposición de métricas Prometheus (latencia, errores, throughput)
      priority: Tier 1

  compliance:
    - id: NFR-COMP-001
      requirement: Auditoría inmutable (WORM)
      description: Append-only audit trail para todas las decisiones KYC
      priority: Tier 0
      
    - id: NFR-COMP-002
      requirement: ISO27001
      description: Certificación de seguridad de información
      priority: Tier 0
      
    - id: NFR-COMP-003
      requirement: GDPR
      description: Cumplimiento RGPD para datos de clientes EU
      priority: Tier 1

# =============================================================================
# SECTION 5: EXTERNAL INTEGRATIONS
# =============================================================================

external_integrations:
  - id: INT-001
    name: AML_SERVICE
    type: REST API (synchronous)
    description: Screening AML/KYC contra listas PEP, sanciones, watchlists
    expected_latency_ms: 1000
    criticality: Tier 0
    
  - id: INT-002
    name: ID_VERIFICATION_PROVIDER
    type: REST API (synchronous)
    description: Verificación biométrica de documentos e identidad (liveness detection, facial recognition)
    expected_latency_ms: 2000
    criticality: Tier 0
    
  - id: INT-003
    name: NOTIFICATION_SERVICE
    type: Event-driven (asynchronous)
    description: Envío de notificaciones email, SMS, push (canales: Web, Mobile)
    expected_latency_ms: 5000
    criticality: Tier 1

