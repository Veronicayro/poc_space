---
bianServiceDomainEvaluation:
  metadata:
    functionalityId: "LON-GHCopilot-Haiku45-Lending-v1"
    functionalityName: "Digital Personal Loan Origination"
    evaluationDate: "2026-06-24"
    evaluatedBy: "bian-service-domain-evaluator"
    bianRelease: "14.0.0"
    evaluationScope: "Map use cases and business rules to BIAN Release 14 Service Domains"
    sourceDomainStandard: "design/bian/bian-release14-source-index.yaml"

  evaluationSummary:
    totalUseCases: 8
    mappedUseCases: 8
    totalBusinessRules: 12
    mappedBusinessRules: 12
    selectedServiceDomains: 4
    highConfidenceMappings: 5
    mediumConfidenceMappings: 2
    lowConfidenceMappings: 0
    unResolvedGaps: 1

  useCaseMapping:
    - useCaseId: "UC-001"
      title: "Loan request initiation"
      actor: "CUSTOMER"
      mappedServiceDomains:
        - serviceDomain: "CustomerOffer"
          role: "primary"
          operations: ["Create"]
          rationale: "Initiates the CustomerOffer procedure for new loan product offer"
          confidence: "HIGH"
        - serviceDomain: "PartyLifecycleManagement"
          role: "prerequisite"
          operations: ["Retrieve"]
          rationale: "Validates KYC status via PartyLifecycleManagement (BR-001)"
          confidence: "HIGH"
      alignmentType: "direct"
      notes: "Request creation triggers both KYC check and offer procedure initiation"

    - useCaseId: "UC-002"
      title: "Document upload"
      actor: "CUSTOMER"
      mappedServiceDomains:
        - serviceDomain: "CustomerOffer"
          role: "supporting"
          operations: ["Update"]
          rationale: "CustomerOffer.Update includes document checks as part of offer verification"
          confidence: "MEDIUM"
      alignmentType: "adapted"
      notes: "BIAN CustomerOffer expects documents but does not specify upload mechanics; external document storage required (EXT-006)"
      unResolvedGaps:
        - "BIAN CustomerOffer does not define document upload protocol; integration with DOCUMENT_STORAGE (EXT-006) requires custom bridge"

    - useCaseId: "UC-003"
      title: "Automated credit evaluation"
      actor: "SYSTEM"
      mappedServiceDomains:
        - serviceDomain: "Underwriting"
          role: "primary"
          operations: ["Create", "ExecuteUnderwritingAssessment"]
          rationale: "Underwriting SD covers automated credit assessment and decision (APPROVED/REFERRED/REJECTED)"
          confidence: "HIGH"
        - serviceDomain: "Underwriting"
          role: "reference"
          businessRulesApplied: ["BR-002", "BR-003", "BR-004", "BR-005"]
          rationale: "Underwriting implements endebtedness limits (BR-002), bureau inquiry (BR-003), score thresholds (BR-004), referral zones (BR-005)"
          confidence: "HIGH"
      alignmentType: "direct"
      notes: "Strong alignment with Underwriting SD; scoring engine (EXT-002) and credit bureau (EXT-001) are external dependencies"

    - useCaseId: "UC-004"
      title: "Personalized offer generation"
      actor: "SYSTEM"
      mappedServiceDomains:
        - serviceDomain: "CustomerOffer"
          role: "primary"
          operations: ["Update", "ExchangeFacilityApplication"]
          rationale: "CustomerOffer.FacilityApplication handles pricing terms, rates, and offer conditions"
          confidence: "HIGH"
        - serviceDomain: "ReferenceDataDirectory"
          role: "supporting"
          operations: ["Retrieve"]
          rationale: "ReferenceDataDirectory provides rates, limits, and pricing policy configuration (BR-006)"
          confidence: "HIGH"
      alignmentType: "direct"
      notes: "Offer generation (rates, terms, amount) maps directly to CustomerOffer.FacilityApplication"

    - useCaseId: "UC-005"
      title: "Digital contract acceptance"
      actor: "CUSTOMER"
      mappedServiceDomains:
        - serviceDomain: "CustomerOffer"
          role: "primary"
          operations: ["ExchangeFacilityApplication"]
          rationale: "CustomerOffer.FacilityApplication.Exchange handles acceptance/rejection of offer terms"
          confidence: "HIGH"
        - serviceDomain: "CustomerOffer"
          role: "reference"
          businessRulesApplied: ["BR-007", "BR-009"]
          rationale: "Offer expiration (BR-007) and signature recording (BR-009) are part of CustomerOffer lifecycle"
          confidence: "MEDIUM"
      alignmentType: "adapted"
      notes: "Contract signing (BR-009 — advanced e-signature) is external (EXT-004); BIAN records acceptance but not signature generation"

    - useCaseId: "UC-006"
      title: "Manual referral review"
      actor: "CREDIT_ANALYST"
      mappedServiceDomains:
        - serviceDomain: "Underwriting"
          role: "primary"
          operations: ["Update", "ExecuteUnderwritingAssessment"]
          rationale: "Underwriting.Update records analyst decision and justification for gray-zone cases"
          confidence: "HIGH"
      alignmentType: "direct"
      notes: "Manual review workflow aligns with Underwriting assessment procedures"

    - useCaseId: "UC-007"
      title: "Disbursement instruction"
      actor: "SYSTEM"
      mappedServiceDomains:
        - serviceDomain: "Disbursement"
          role: "primary"
          operations: ["Create", "ExecuteDisbursement"]
          rationale: "Disbursement SD handles fund transfer instruction and confirmation"
          confidence: "HIGH"
        - serviceDomain: "ConsumerLoan"
          role: "supporting"
          operations: ["Initiate"]
          rationale: "ConsumerLoan product may be created/linked after disbursement (post-origination servicing)"
          confidence: "MEDIUM"
      alignmentType: "direct"
      notes: "Disbursement instruction maps directly; ConsumerLoan is relevant for post-disbursal product lifecycle"

    - useCaseId: "UC-008"
      title: "Status notification"
      actor: "SYSTEM"
      mappedServiceDomains: []
      alignmentType: "n/a"
      unResolvedGaps:
        - "Notification/messaging is cross-cutting; no dedicated BIAN SD. Handled by external NOTIFICATION_SERVICE (EXT-005) + event publication"
      notes: "BIAN does not define notification domains; this is typically infrastructure/messaging responsibility"

  businessRuleMapping:
    - ruleId: "BR-001"
      title: "KYC approved required"
      mappedServiceDomain: "PartyLifecycleManagement"
      operations: ["Retrieve"]
      alignmentType: "direct"
      notes: "PartyLifecycleManagement provides KYC status lookup"

    - ruleId: "BR-002"
      title: "Endebtedness limit"
      mappedServiceDomain: "Underwriting"
      operations: ["ExecuteUnderwritingAssessment"]
      alignmentType: "direct"
      notes: "Underwriting assessment includes endebtedness calculation"

    - ruleId: "BR-003"
      title: "Credit bureau inquiry mandatory"
      mappedServiceDomain: "Underwriting"
      operations: ["ExecuteUnderwritingAssessment"]
      alignmentType: "adapted"
      notes: "Underwriting triggers bureau inquiry; EXT-001 (CREDIT_BUREAU) is external dependency"

    - ruleId: "BR-004"
      title: "Automatic rejection for low score"
      mappedServiceDomain: "Underwriting"
      operations: ["ExecuteUnderwritingAssessment"]
      alignmentType: "adapted"
      notes: "Scoring threshold logic is configurable in Underwriting; specific threshold values (BR-004 parameter) are external"

    - ruleId: "BR-005"
      title: "Referral for gray zone"
      mappedServiceDomain: "Underwriting"
      operations: ["ExecuteUnderwritingAssessment"]
      alignmentType: "adapted"
      notes: "Underwriting gray-zone detection and referral workflow; thresholds are configurable"

    - ruleId: "BR-006"
      title: "Regulatory maximum rates"
      mappedServiceDomain: "ReferenceDataDirectory"
      operations: ["Retrieve"]
      alignmentType: "adapted"
      notes: "Rate limits stored in ReferenceDataDirectory; enforcement is policy-specific"

    - ruleId: "BR-007"
      title: "Offer expiration (72 hours)"
      mappedServiceDomain: "CustomerOffer"
      operations: ["Update"]
      alignmentType: "adapted"
      notes: "CustomerOffer lifecycle includes validity periods; enforcement mechanism (webhook/scheduler) is external"

    - ruleId: "BR-008"
      title: "One active request per customer"
      mappedServiceDomain: "CustomerOffer"
      operations: ["Create"]
      alignmentType: "adapted"
      notes: "Validation logic; not explicitly in BIAN but expected in orchestration layer"

    - ruleId: "BR-009"
      title: "Advanced e-signature required"
      mappedServiceDomain: "CustomerOffer"
      operations: ["Update"]
      alignmentType: "adapted"
      notes: "CustomerOffer records signature; signature generation is external (EXT-004 — DIGITAL_SIGNATURE_PROVIDER)"

    - ruleId: "BR-010"
      title: "Audit log of decisions"
      mappedServiceDomain: "Underwriting"
      operations: ["Update"]
      alignmentType: "adapted"
      notes: "BIAN expects audit trail; external INT-002 (Audit & Compliance Log) handles persistence"

    - ruleId: "BR-011"
      title: "Validation before disbursement"
      mappedServiceDomain: "Disbursement"
      operations: ["ExecuteDisbursement"]
      alignmentType: "adapted"
      notes: "Disbursement includes pre-execution validation (signature check, account validation)"

    - ruleId: "BR-012"
      title: "Data encryption at rest"
      mappedServiceDomain: "n/a"
      alignmentType: "n/a"
      notes: "Cross-cutting security requirement; not BIAN-specific"

  selectedServiceDomains:
    - rank: 1
      serviceDomain: "CustomerOffer"
      bianSdFile: "architecture/cache/bian/release14.0.0/oas3/yamls/CustomerOffer.yaml"
      coverage:
        useCases: ["UC-001", "UC-004", "UC-005"]
        businessRules: ["BR-007", "BR-008", "BR-009"]
      alignmentType: "direct"
      confidence: 0.95
      rationale: |
        Primary domain for offer generation, acceptance, and lifecycle management.
        Maps to both offer creation (UC-004) and customer acceptance (UC-005).
        Strong alignment with BIAN expectations for FacilityApplication workflows.

    - rank: 2
      serviceDomain: "Underwriting"
      bianSdFile: "architecture/cache/bian/release14.0.0/oas3/yamls/Underwriting.yaml"
      coverage:
        useCases: ["UC-003", "UC-006"]
        businessRules: ["BR-002", "BR-003", "BR-004", "BR-005", "BR-010"]
      alignmentType: "direct"
      confidence: 0.95
      rationale: |
        Primary domain for credit evaluation and decision-making.
        Covers both automated assessment (UC-003) and manual review (UC-006).
        Direct alignment with scoring, bureau inquiry, and referral workflows.

    - rank: 3
      serviceDomain: "Disbursement"
      bianSdFile: "architecture/cache/bian/release14.0.0/oas3/yamls/Disbursement.yaml"
      coverage:
        useCases: ["UC-007"]
        businessRules: ["BR-011"]
      alignmentType: "direct"
      confidence: 0.90
      rationale: |
        Primary domain for disbursement execution.
        Covers fund transfer instruction (UC-007).
        Alignment is direct but requires integration with CORE_BANKING (EXT-003) for actual transfer.

    - rank: 4
      serviceDomain: "PartyLifecycleManagement"
      bianSdFile: "architecture/cache/bian/release14.0.0/oas3/yamls/PartyLifecycleManagement.yaml"
      coverage:
        useCases: ["UC-001"]
        businessRules: ["BR-001"]
      alignmentType: "direct"
      confidence: 0.85
      rationale: |
        Supporting domain for KYC validation and customer identity.
        Maps to BR-001 (KYC approved required).
        Prerequisite check before loan request initiation.

  rejectedCandidates:
    - serviceDomain: "ConsumerLoan"
      reason: "Out of scope for origination-only functionality. ConsumerLoan is relevant for post-disbursal servicing (not in this release)."
      recommendation: "Reserve for Phase 3+ if servicing features are added"

    - serviceDomain: "ReferenceDataDirectory"
      reason: "Supporting role only (pricing configuration). Not a primary mapping but required as dependency."
      recommendation: "Integrate as data source for offer generation (UC-004)"

  unResolvedGaps:
    - id: "GAP-EVAL-001"
      title: "Document Upload Protocol"
      description: |
        BIAN CustomerOffer expects documents but does not define upload mechanics.
        Discovery gap G-004 remains: document types and validation rules not specified.
      severity: "MEDIUM"
      resolution: "Phase 6 (backend-component-design) defines document handling and DOCUMENT_STORAGE (EXT-006) integration"

    - id: "GAP-EVAL-002"
      title: "Notification/Messaging Cross-Cutting"
      description: |
        UC-008 (Status notification) has no BIAN mapping.
        BIAN does not define notification Service Domains.
      severity: "LOW"
      resolution: "Handled by external NOTIFICATION_SERVICE (EXT-005) and event infrastructure; not BIAN-dependent"

  confidenceAndRationale:
    overallEvaluationConfidence: 0.92
    rationale: |
      Strong alignment with BIAN Release 14 for primary loan origination workflows.
      - Underwriting and CustomerOffer provide excellent coverage of core use cases (UC-001–UC-007).
      - Secondary Service Domains (PartyLifecycleManagement, Disbursement) are well-defined.
      - External integrations (credit bureau, scoring, core banking, document storage) are explicit.
      - UC-008 (notifications) is cross-cutting and not BIAN-specific; handled separately.
      
    additionalNotes: |
      This evaluation demonstrates that BIAN Release 14 provides a solid foundation for
      Digital Personal Loan Origination. The selection of 4 primary Service Domains
      (CustomerOffer, Underwriting, Disbursement, PartyLifecycleManagement) covers
      the entire origination workflow with minimal gaps.
