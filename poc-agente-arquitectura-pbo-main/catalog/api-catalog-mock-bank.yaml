                  status: "Published"
                  x-contract-version: "2026-06-10"
                  environments:
                    dev: "https://api.dev.globalbank.example.com/account-management/v1"
                    qa: "https://api.qa.globalbank.example.com/account-management/v1"
                    uat: "https://api.uat.globalbank.example.com/account-management/v1"
                    prod: "https://api.globalbank.example.com/account-management/v1"
                  consumers:
                    - "Mobile Banking App"
                    - "Web Banking"
                  dependencies:
                    - api: "Customers/CustomerOnboarding/CustomerProfileAPI"
                      reason: "Validación de titularidad y datos del cliente."
                    - api: "Compliance/KYC/KYCScreeningAPI"
                      reason: "Controles KYC para apertura."
                    - api: "Payments/PayeeManagement/BeneficiaryDirectoryAPI"
                      reason: "Asociación de beneficiarios por cuenta."
                  security:
                    scheme: "OAuth2"
                    grantTypes: ["authorization_code", "client_credentials"]
                    scopes:
                      - "accounts.read"
                      - "accounts.write"
                      - "accounts.limits.write"
                  observability:
                    metrics: ["request_count", "latency_ms_p95", "error_rate_5xx", "db_time_ms_p95"]
                    logs:
                      level: "INFO"
                      piiRedaction: true
                      fields: ["timestamp", "correlationId", "accountId", "customerId", "action", "status"]
                    tracing:
                      enabled: true
                  lifecycle:
                    deprecationPolicy: "12 months notice."
                    changeManagement: "Core banking regression tests required."
              openapiSummary:
                openapi: "3.0.3"
                info:
                  title: "Account Management API"
                  version: "v1"
                paths:
                  /accounts:
                    post:
                      summary: "Abrir cuenta"
                      headers:
                        - name: "Idempotency-Key"
                          required: true
                      responses:
                        "201":
                          description: "Cuenta creada"
                          schemaRef: "#/components/schemas/Account"
                    get:
                      summary: "Buscar cuentas"
                      queryParams: ["customerId", "status", "cursor", "limit"]
                      responses:
                        "200":
                          description: "Cuentas"
                          schemaRef: "#/components/schemas/AccountSearchResponse"
                  /accounts/{accountId}:
                    get:
                      summary: "Obtener cuenta"
                      responses:
                        "200":
                          description: "Cuenta"
                          schemaRef: "#/components/schemas/Account"
                    patch:
                      summary: "Actualizar estado/límites"
                      headers:
                        - name: "Idempotency-Key"
                          required: true
                      responses:
                        "200":
                          description: "Actualizada"
                          schemaRef: "#/components/schemas/Account"

            AccountTransactionsAPI:
              metadata:
                name: "Account Transactions API"
                description: "Consulta de transacciones, preautorizaciones, movimientos pendientes y categorización."
                owner: "Ledger & Transactions Squad"
                sla: "99.9%"
                dataClassification: ["Confidential", "PII"]
                criticalityTier: "Tier 1"
                region: "global"
                tags: ["accounts", "transactions", "ledger"]
              apiType: "Internal"
              versions:
                - version: "2.1.0"
                  status: "Published"
                  x-contract-version: "2026-05-20"
                  environments:
                    dev: "https://api.dev.globalbank.example.com/account-transactions/v2"
                    qa: "https://api.qa.globalbank.example.com/account-transactions/v2"
                    uat: "https://api.uat.globalbank.example.com/account-transactions/v2"
                    prod: "https://api.globalbank.example.com/account-transactions/v2"
                  consumers:
                    - "Mobile Banking App"
                    - "Web Banking"
                  dependencies:
                    - api: "Accounts/AccountServicing/AccountManagementAPI"
                      reason: "Validación de cuenta y estado."
                  security:
                    scheme: "OAuth2"
