# =============================================================================
# BIAN Capability Index — GlobalBank API Catalog (Compact Router)
# =============================================================================
#
# TOKEN BUDGET: ~90 lines. Read THIS file for collision checks and capability
# lookup. Open catalog/bian-capability-alignment.yaml ONLY when you need the
# full governance_note, bian_sd_description or secondary_bian_sd detail.
#
# Agent usage pattern:
#   1. Read this file (1 tool call) to answer: "does this capability exist?"
#   2. If bian_coverage=aligned → contract must derive from bian_sd
#   3. If overlap_risk=HIGH/MEDIUM → check collisions_requiring_review section
#   4. If no-match → proprietary capability, no BIAN derivation needed
#   5. For full detail: read catalog/bian-capability-alignment.yaml#<capability_id>
# =============================================================================

meta:
  source: "catalog/bian-capability-alignment.yaml"
  bian_release: "14.0.0"
  framework: "TOGAF 10 + BIAN R14"
  total_capabilities: 20
  coverage_stats: {aligned: 8, partial: 10, no_match: 2}

# ---------------------------------------------------------------------------
# CAPABILITY LOOKUP TABLE
# Fields: id | area | name | bian_sd | cov | risk | catalog_apis (short ref)
# cov: A=aligned P=partial N=no-match
# ---------------------------------------------------------------------------
capabilities:

  # — Party & Customer Management (domain: Customers) —
  - id: CAP-PARTY-001
    name: "Customer Profile & Master Data"
    bian_sd: PartyReferenceDataDirectory
    cov: P  # mezcla PartyReferenceData + PartyLifecycle en un contrato
    risk: MEDIUM
    apis: [CustomerProfileAPI v1.2]

  - id: CAP-PARTY-002
    name: "Customer Identity & KYC Lifecycle"
    bian_sd: PartyLifecycleManagement
    cov: A
    risk: MEDIUM  # solapamiento funcional con KYCScreeningAPI (ver OVL-002)
    apis: [CustomerIdentityAPI v1.1 Tier0]

  - id: CAP-PARTY-003
    name: "Customer Consent & Privacy"
    bian_sd: CustomerAgreement
    cov: P  # consentimientos digitales granulares fuera del scope BIAN
    risk: LOW
    apis: [CustomerConsentAPI v2.0]

  # — Deposit & Account Management (domain: Accounts) —
  - id: CAP-ACC-001
    name: "Account Servicing & Lifecycle"
    bian_sd: CurrentAccount  # secondary: SavingsAccount
    cov: P  # un API cubre dos SDs BIAN distintos
    risk: LOW
    apis: [AccountManagementAPI v1.3 Tier0]

  - id: CAP-ACC-002
    name: "Transaction Ledger & History"
    bian_sd: PositionKeeping
    cov: A
    risk: LOW
    apis: [AccountTransactionsAPI v2.1]

  - id: CAP-ACC-003
    name: "Statement Generation & Delivery"
    bian_sd: Correspondence  # secondary: DocumentServices
    cov: P  # on-demand digital + URLs firmadas es extensión propietaria
    risk: LOW
    apis: [StatementDeliveryAPI v1.0]

  # — Payments & Transfers (domain: Payments) —
  - id: CAP-PAY-001
    name: "Payment Initiation & Processing"
    bian_sd: PaymentOrderInitiation  # secondary: PaymentRail
    cov: P
    risk: HIGH  # ⚠ OVL-001: dos APIs apuntan al mismo SD
    apis: [PaymentsProcessingAPI v2.4 Tier0, InstantTransfersAPI v1.6 Tier0]

  - id: CAP-PAY-002
    name: "Beneficiary & Payee Directory"
    bian_sd: ~  # no BIAN SD — capacidad propietaria
    cov: N
    risk: NONE
    apis: [BeneficiaryDirectoryAPI v1.2]

  - id: CAP-PAY-003
    name: "Payment Limits & Controls"
    bian_sd: CustomerAccessEntitlement
    cov: P  # límites monetarios dinámicos fuera del scope BIAN
    risk: LOW
    apis: [PaymentLimitsAPI v1.0]

  - id: CAP-PAY-004
    name: "FX Rate Quotation"
    bian_sd: CurrencyExchange  # secondary: CorporateTreasury
    cov: P
    risk: LOW
    apis: [FXRatesAPI v1.4]

  # — Card Products (domain: Cards) —
  - id: CAP-CARD-001
    name: "Card Issuance & Lifecycle"
    bian_sd: CreditCard  # secondary: IssuedDeviceAdministration
    cov: A
    risk: LOW
    apis: [CardManagementAPI v1.5 Tier0]

  - id: CAP-CARD-002
    name: "Card Transaction Authorization"
    bian_sd: CardAuthorization
    cov: A
    risk: LOW
    apis: [CardAuthorizationAPI v2.0 Tier0]

  - id: CAP-CARD-003
    name: "Card Dispute & Chargeback"
    bian_sd: CardCase
    cov: A
    risk: LOW
    apis: [CardDisputesAPI v1.1]

  # — Lending & Credit (domain: Loans) —
  - id: CAP-LOAN-001
    name: "Loan Origination & Underwriting"
    bian_sd: CustomerOffer  # secondary: Underwriting
    cov: P
    risk: LOW
    apis: [CreditApplicationAPI v1.3]

  - id: CAP-LOAN-002
    name: "Loan Servicing & Repayment"
    bian_sd: ConsumerLoan
    cov: A
    risk: LOW
    apis: [LoanServicingAPI v2.2 Tier0]

  - id: CAP-LOAN-003
    name: "Loan Disbursement"
    bian_sd: Disbursement
    cov: A
    risk: LOW
    apis: [DisbursementAPI v1.1]

  # — Compliance & Financial Crime (domain: Compliance) —
  - id: CAP-COMP-001
    name: "KYC / AML Screening"
    bian_sd: PartyLifecycleManagement  # secondary: GuidelineCompliance
    cov: P  # screening puntual desacoplado del lifecycle; ver OVL-002
    risk: MEDIUM
    apis: [KYCScreeningAPI v3.0 Tier0]

  - id: CAP-COMP-002
    name: "Sanctions Screening"
    bian_sd: RegulatoryCompliance  # secondary: GuidelineCompliance
    cov: P
    risk: LOW
    apis: [SanctionsScreeningAPI v2.3 Tier0]

  - id: CAP-COMP-003
    name: "Immutable Audit Trail"
    bian_sd: ComplianceReporting  # secondary: InternalAudit
    cov: P  # patrón WORM + hash criptográfico es extensión propietaria
    risk: LOW
    apis: [AuditTrailAPI v1.2 Tier0]

  - id: CAP-COMP-004
    name: "Regulatory Document Retention"
    bian_sd: ArchiveServices  # secondary: DocumentDirectory
    cov: A
    risk: LOW
    apis: [DocumentArchiveAPI v1.0]

  # — Risk Management (domain: Risk) —
  - id: CAP-RISK-001
    name: "Real-Time Fraud Decisioning"
    bian_sd: FraudEvaluation
    cov: A
    risk: LOW
    apis: [FraudDecisioningAPI v1.8 Tier0]

  - id: CAP-RISK-002
    name: "Transaction Monitoring & AML Cases"
    bian_sd: FraudDiagnosis  # secondary: GuidelineCompliance
    cov: P
    risk: LOW
    apis: [TransactionMonitoringAPI v1.2]

  - id: CAP-RISK-003
    name: "Credit Risk Decisioning"
    bian_sd: CustomerCreditRating  # secondary: Underwriting
    cov: A
    risk: MEDIUM  # solapamiento con CAP-RISK-005; ver OVL-003
    apis: [CreditDecisioningAPI v2.0 Tier0]

  - id: CAP-RISK-004
    name: "Market Risk Indicators"
    bian_sd: MarketAnalysis  # secondary: AssetAndLiabilityManagement
    cov: P
    risk: LOW
    apis: [MarketRiskIndicatorsAPI v1.1]

  - id: CAP-RISK-005
    name: "Customer Risk Scoring"
    bian_sd: CustomerCreditRating  # secondary: CustomerBehaviorInsights
    cov: P
    risk: MEDIUM  # mismo SD que CAP-RISK-003; ver OVL-003
    apis: [CustomerRiskScoringAPI v1.0]

  # — Digital Channels (domain: Channels) —
  - id: CAP-CHAN-001
    name: "Digital Session & Authentication"
    bian_sd: PartyAuthentication  # secondary: eBranchOperations
    cov: P
    risk: LOW
    apis: [ChannelSessionAPI v2.1 Tier0]

  - id: CAP-CHAN-002
    name: "Multichannel Notification Dispatch"
    bian_sd: ~  # push/SMS real-time no tiene SD en BIAN R14
    cov: N
    risk: NONE
    apis: [NotificationDispatchAPI v1.7]

  - id: CAP-CHAN-003
    name: "Notification Preferences & Consent"
    bian_sd: CustomerAccessEntitlement
    cov: P
    risk: LOW
    apis: [CustomerNotificationPreferencesAPI v1.1]

