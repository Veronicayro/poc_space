  PartyLifecycleManagement:     [CAP-PARTY-002, CAP-COMP-001]  # ⚠ two APIs — see OVL-002
  CustomerAgreement:            [CAP-PARTY-003]
  CurrentAccount:               [CAP-ACC-001]
  SavingsAccount:               [CAP-ACC-001]                   # same API as CurrentAccount
  PositionKeeping:              [CAP-ACC-002]
  Correspondence:               [CAP-ACC-003, CAP-CHAN-002]
  PaymentOrderInitiation:       [CAP-PAY-001]                   # ⚠ two APIs — see OVL-001
  PaymentRail:                  [CAP-PAY-001]
  CustomerAccessEntitlement:    [CAP-PAY-003, CAP-CHAN-003]
  CurrencyExchange:             [CAP-PAY-004]
  CorporateTreasury:            [CAP-PAY-004]
  CreditCard:                   [CAP-CARD-001]
  IssuedDeviceAdministration:   [CAP-CARD-001]
  CardAuthorization:            [CAP-CARD-002]
  CardCase:                     [CAP-CARD-003]
  CustomerOffer:                [CAP-LOAN-001]
  Underwriting:                 [CAP-LOAN-001, CAP-RISK-003]
  ConsumerLoan:                 [CAP-LOAN-002]
  Disbursement:                 [CAP-LOAN-003]
  GuidelineCompliance:          [CAP-COMP-001, CAP-COMP-002, CAP-RISK-002]
  RegulatoryCompliance:         [CAP-COMP-002]
  ComplianceReporting:          [CAP-COMP-003]
  InternalAudit:                [CAP-COMP-003]
  ArchiveServices:              [CAP-COMP-004]
  DocumentDirectory:            [CAP-COMP-004]
