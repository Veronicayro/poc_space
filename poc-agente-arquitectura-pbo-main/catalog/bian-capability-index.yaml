  FraudDiagnosis:               [CAP-RISK-002]
  CustomerCreditRating:         [CAP-RISK-003, CAP-RISK-005]    # ⚠ two APIs — see OVL-003
  MarketAnalysis:               [CAP-RISK-004]
  AssetAndLiabilityManagement:  [CAP-RISK-004]
  CustomerBehaviorInsights:     [CAP-RISK-005]
  PartyAuthentication:          [CAP-CHAN-001]
  eBranchOperations:            [CAP-CHAN-001]
  # --- GAPS (no catalog coverage) ---
  StandingOrder:                [GAP-001]
  ServicingMandate:             [GAP-002]
  TermDeposit:                  [GAP-003]
  ChannelActivityHistory:       [GAP-004]
  TransactionAuthorization:     [GAP-005]

# ---------------------------------------------------------------------------
# COLLISIONS REQUIRING REVIEW (overlap_risk: HIGH or MEDIUM)
# Run Phase 0 before adding any API that overlaps these SDs.
# ---------------------------------------------------------------------------
collisions_requiring_review:
  - id: OVL-001
    severity: HIGH
    bian_sd: PaymentOrderInitiation
    apis: [PaymentsProcessingAPI, InstantTransfersAPI]
    action: "REVIEW_REQUIRED — ejecutar Phase 0 antes de agregar cualquier nueva API de pagos"

  - id: OVL-002
    severity: MEDIUM
    bian_sd: PartyLifecycleManagement
    apis: [CustomerIdentityAPI, KYCScreeningAPI]
    action: "DOCUMENT_BOUNDARY — CustomerIdentityAPI=stateful owner; KYCScreeningAPI=stateless evaluator"

  - id: OVL-003
    severity: MEDIUM
    bian_sd: CustomerCreditRating
    apis: [CreditDecisioningAPI, CustomerRiskScoringAPI]
    action: "ALIGN_DATA_MODEL — decision puntual vs. perfil continuo; evitar modelos duplicados"

  - id: OVL-004
    severity: MEDIUM
    bian_sd: PartyReferenceDataDirectory
    apis: [CustomerProfileAPI, CustomerIdentityAPI]
    action: "DEFINE_OWNERSHIP_BOUNDARY — ProfileAPI=dueno de datos demograficos; IdentityAPI=documentos+SCA"

# ---------------------------------------------------------------------------
# CAPABILITY GAPS (BIAN SDs sin cobertura en el catalogo actual)
# Use these to decide CREATE when a new request matches a gap.
# ---------------------------------------------------------------------------
gaps:
  - {id: GAP-001, bian_sd: StandingOrder,          description: "Sin API de pagos recurrentes/programados"}
  - {id: GAP-002, bian_sd: ServicingMandate,        description: "Sin API Open Banking / PSD2 para TPP"}
  - {id: GAP-003, bian_sd: TermDeposit,             description: "Sin API de Deposito a Plazo Fijo"}
  - {id: GAP-004, bian_sd: ChannelActivityHistory,  description: "Sin API de eventos de cuenta (webhooks)"}
  - {id: GAP-005, bian_sd: TransactionAuthorization, description: "Sin API de autorizacion transaccional por canal"}
