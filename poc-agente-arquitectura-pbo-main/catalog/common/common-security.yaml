commonSecurity:
  oauth2:
    tokenUrl: "https://auth.globalbank.example.com/oauth2/token"
    authorizationUrl: "https://auth.globalbank.example.com/oauth2/authorize"
    audience: "https://api.globalbank.example.com"
    jwksUrl: "https://auth.globalbank.example.com/.well-known/jwks.json"
    grantTypesSupported:
      - "client_credentials"
      - "authorization_code"
    scopesCatalog:
      customers:
        - "customers.profile.read"
        - "customers.profile.write"
        - "customers.identity.read"
        - "customers.identity.write"
        - "customers.documents.read"
        - "customers.documents.write"
        - "consents.read"
        - "consents.write"
        - "consents.revoke"
      accounts:
        - "accounts.read"
        - "accounts.write"
        - "accounts.limits.write"
        - "accounts.transactions.read"
        - "accounts.transactions.export"
      payments:
        - "payments.initiate"
        - "payments.read"
        - "payments.cancel"
        - "payments.instant.initiate"
        - "payments.instant.read"
        - "beneficiaries.read"
        - "beneficiaries.write"
        - "beneficiaries.verify"
        - "payments.limits.read"
        - "payments.limits.write"
        - "fx.rates.read"
      cards:
        - "cards.read"
        - "cards.write"
        - "cards.block"
        - "cards.replace"
        - "cards.auth.read"
        - "cards.auth.decision"
        - "cards.disputes.read"
        - "cards.disputes.write"
        - "cards.disputes.evidence.write"
      loans:
        - "loans.read"
        - "loans.applications.read"
        - "loans.applications.write"
        - "loans.applications.submit"
        - "loans.repayments.initiate"
        - "loans.restructures.request"
        - "loans.disbursement.initiate"
        - "loans.disbursement.read"
      compliance:
        - "compliance.kyc.screen"
        - "compliance.kyc.results.read"
        - "compliance.sanctions.screen"
        - "compliance.sanctions.results.read"
        - "audit.write"
        - "audit.read"
        - "documents.archive.write"
        - "documents.archive.read"
      risk:
        - "risk.fraud.score"
        - "risk.fraud.decision"
        - "risk.credit.decision"
        - "risk.credit.read"
        - "risk.customer.read"
        - "risk.customer.score"
        - "risk.market.read"
