schema_id: persistence-model
artifact_path_pattern: design/<layer>/<component>/data/persistence-model.yaml
required_fields:
  - engine_recommendation
  - rationale
  - ownership
  - model_type
  - retention_notes
fields:
  engine_recommendation:
    enum: [relational, document, key-value, wide-column, graph, event-store, object-storage, none]
  rationale: string
  ownership:
    owner_component: string
    read_by: array
    written_by: array
  model_type:
    enum: [relational, nosql, object, event, none]
  entities: array
  tables: array
  columns: array
  primary_keys: array
  foreign_keys: array
  unique_constraints: array
  check_constraints: array
  indexes: array
  transaction_boundaries: array
  collection_or_bucket_design: array
  document_or_record_model: object
  access_patterns: array
  partitioning: string_or_null
  secondary_indexes: array
  validation_rules: array
  retention_notes: string
