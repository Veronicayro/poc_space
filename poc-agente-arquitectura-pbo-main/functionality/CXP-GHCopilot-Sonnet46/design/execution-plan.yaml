nfr_decisions:
  performance:
    sla_ms: 300
    concurrent_users: 500
    strategy: >
      PostgreSQL connection pooling, índices compuestos por (status, supplier_id),
      caché de validaciones de proveedor con TTL corto.

  security:
    auth: "OAuth2 / OpenID Connect"
    authorization: "RBAC: ANALYST, MANAGER, TREASURER"
    transport: "TLS 1.2+"
    integrations:
      erp: "OAuth2 client_credentials"
      banking: "mTLS + API Key + Webhook signature validation"

  observability:
    tracing: "OpenTelemetry (distributed tracing)"
    metrics: "Prometheus (latency, error rate, state transitions)"
    logging: "Structured JSON + X-Correlation-ID header"

  reliability:
    retry: "Exponential backoff, máx. 3 reintentos (ERP y Banking)"
    circuit_breaker: "Resilience4j / opossum pattern"
    idempotency: "X-Idempotency-Key en operaciones de pago bancario"
    webhook_deduplication: "Event ID unique check + idempotent handler"

  database:
    technology: PostgreSQL
    pattern: schema-per-service
    acid: true
    indexes: "[status, supplier_id, due_date, created_at]"
    audit: "AuditLog table inmutable (append-only)"

  compliance:
    iso27001: true
    sox_readiness: true
    audit_trail: "Completo en todas las transiciones de estado"

