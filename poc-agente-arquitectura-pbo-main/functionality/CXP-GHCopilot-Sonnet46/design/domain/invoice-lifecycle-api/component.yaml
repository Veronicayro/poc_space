schema_version: "1.0"
functionality_id: CXP-GHCopilot-Sonnet46
component_name: invoice-lifecycle-api
component_type: api
layer: domain
decision: create
phase: backend-component-design
generated_at: "2026-06-17"

purpose: >
  Pure domain service that owns the invoice state machine. Validates state
  transitions, rejects invalid ones, and maintains an immutable audit trail.
  Has no external dependencies; consumed only by business APIs.

owner_scope: "Financial Operations – Invoice Domain"

bian:
  aligned: true
  release: "14"
  selected_service_domain: AccountsReceivable
  alignment_type: adapted
  adoption_file: design/bian/bian-service-domain-evaluation.yaml

responsibilities:
  - Validate and execute invoice state transitions (BR-008)
  - Reject invalid transitions with descriptive error
  - Persist immutable state transition history
  - Register complete audit log (actor, timestamp, from/to state)
  - Expose current state and full history per invoice

non_responsibilities:
  - Business rule orchestration (that belongs to invoice-management-api)
  - External system calls
  - Payment scheduling

dependencies:
  synchronous: []
  asynchronous:
    publishes: []
    consumes: []

consumers:
  - invoice-management-api
  - payment-management-api

state_owner_if_any: "Invoice lifecycle (authoritative source of state)"

data_ownership:
  owns_persistent_data: true
  persistence_model: >
    PostgreSQL tables:
    - invoice_lifecycle (invoice_id PK, current_state, last_updated_at)
    - state_transitions (id, invoice_id, from_state, to_state, performed_by, timestamp, reason) – append-only
    - audit_log (id, entity, entity_id, action, performed_by, timestamp, metadata) – append-only

cache_usage:
  uses_cache: false
  cache_model: null

events:
  publishes: []
  consumes: []

state_machine:
  entity: Invoice
  states: [PENDING, APPROVED, REJECTED, SCHEDULED, PAID, CANCELLED]
  valid_transitions:
    PENDING: [APPROVED, REJECTED, CANCELLED]
    APPROVED: [SCHEDULED, CANCELLED]
    SCHEDULED: [PAID, CANCELLED]
    REJECTED: []
    PAID: []
    CANCELLED: []
  rule_ref: BR-008

endpoints:
  - method: POST
    path: /api/v1/invoice-lifecycle/{id}/transition
    description: "Execute a validated state transition"
    body: "{to_state, performed_by, reason}"
    business_rules: [BR-008]

  - method: GET
    path: /api/v1/invoice-lifecycle/{id}/history
    description: "Get immutable transition history for an invoice"

  - method: GET
    path: /api/v1/invoice-lifecycle/{id}/current-state
    description: "Get current lifecycle state for an invoice"

nfrs:
  performance_sla_ms: 100
  observability:
    tracing: "OpenTelemetry"
    metrics: "Prometheus (state_transitions_total by from/to)"
    logging: "Structured JSON"
  reliability:
    audit_immutability: true
    acid_transactions: true

status: draft
