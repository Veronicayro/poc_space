openapi: 3.0.3
info:
  title: Invoice Lifecycle API
  description: >
    Domain API for invoice state machine management.
    Pure domain service – no external dependencies.
    BIAN alignment: AccountsReceivable (semantic_alignment – InvoiceLifecycleProcedure).
    Generated by: GitHub Copilot – Claude Sonnet 4.6
  version: "1.0.0"

servers:
  - url: /api/v1/invoice-lifecycle
    description: Base path v1

tags:
  - name: lifecycle
    description: Invoice state machine and audit trail

paths:
  /invoice-lifecycle/{id}/transition:
    post:
      tags: [lifecycle]
      operationId: transitionInvoiceState
      summary: Execute a validated state transition
      description: >
        Validates that the requested transition is permitted by the state machine (BR-008).
        On success, persists the transition in the immutable history and audit log.
        On invalid transition, returns 422 with INVALID_STATE_TRANSITION error code.
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransitionRequest"
      responses:
        "200":
          description: Transition executed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LifecycleStateResponse"
        "404":
          description: Invoice not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "422":
          description: Invalid state transition
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /invoice-lifecycle/{id}/current-state:
    get:
      tags: [lifecycle]
      operationId: getCurrentState
      summary: Get current lifecycle state of an invoice
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
      responses:
        "200":
          description: Current state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LifecycleStateResponse"
        "404":
          description: Invoice not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /invoice-lifecycle/{id}/history:
    get:
      tags: [lifecycle]
      operationId: getStateHistory
      summary: Get immutable state transition history
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
      responses:
        "200":
          description: Transition history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StateHistoryResponse"
        "404":
          description: Invoice not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

components:
  parameters:
    InvoiceId:
      name: id
      in: path
      required: true
      description: Invoice UUID
      schema:
        type: string
        format: uuid

  schemas:
    InvoiceState:
      type: string
      enum: [PENDING, APPROVED, REJECTED, SCHEDULED, PAID, CANCELLED]

    TransitionRequest:
      type: object
      required: [to_state, performed_by]
      properties:
        to_state:
          $ref: "#/components/schemas/InvoiceState"
        performed_by:
          type: string
          description: "User identifier (sub from JWT)"
        reason:
          type: string
          maxLength: 500
          description: "Required for REJECTED transitions; optional for others"

    LifecycleStateResponse:
      type: object
      properties:
        invoice_id:
          type: string
          format: uuid
        current_state:
          $ref: "#/components/schemas/InvoiceState"
        last_updated_at:
          type: string
          format: date-time
        last_updated_by:
          type: string

    StateTransitionEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        invoice_id:
          type: string
          format: uuid
        from_state:
          $ref: "#/components/schemas/InvoiceState"
        to_state:
          $ref: "#/components/schemas/InvoiceState"
        performed_by:
          type: string
        timestamp:
          type: string
          format: date-time
        reason:
          type: string
          nullable: true

    StateHistoryResponse:
      type: object
      properties:
        invoice_id:
          type: string
          format: uuid
        transitions:
          type: array
          items:
            $ref: "#/components/schemas/StateTransitionEntry"

    ProblemDetails:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        error_code:
          type: string
          example: "INVALID_STATE_TRANSITION"
        trace_id:
          type: string
