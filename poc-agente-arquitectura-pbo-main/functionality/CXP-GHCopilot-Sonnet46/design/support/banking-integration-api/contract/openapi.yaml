openapi: 3.0.3
info:
  title: Banking Integration API
  description: >
    Support API (Adapter) for Banking System integration.
    Sends payment orders, queries status, and handles inbound webhook confirmations.
    BIAN alignment: FinancialGateway (reference – FinancialGatewayTransaction).
    Generated by: GitHub Copilot – Claude Sonnet 4.6
  version: "1.0.0"

servers:
  - url: /api/v1/banking
    description: Base path v1

tags:
  - name: payment-orders
    description: Payment order operations with Banking System
  - name: webhooks
    description: Inbound banking webhook handling

paths:
  /banking/payment-orders:
    post:
      tags: [payment-orders]
      operationId: sendPaymentOrder
      summary: Send payment order to Banking System
      description: >
        Transforms internal PaymentOrder to BankingPaymentRequest and sends to Banking System.
        X-Idempotency-Key prevents duplicate payments.
        BIAN reference: FinancialGatewayTransaction → BankingPaymentRequest.
      parameters:
        - name: X-Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BankingPaymentRequest"
      responses:
        "201":
          description: Payment order accepted by Banking System
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BankingPaymentResponse"
        "409":
          description: Duplicate payment (idempotency key already used)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "502":
          description: Banking System error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /banking/payment-orders/{orderId}:
    get:
      tags: [payment-orders]
      operationId: getPaymentOrderStatus
      summary: Query payment order status from Banking System
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Payment order status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BankingPaymentResponse"
        "404":
          description: Payment order not found in Banking System
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /banking/webhooks/inbound:
    post:
      tags: [webhooks]
      operationId: receiveWebhook
      summary: Receive and validate inbound banking webhook
      description: >
        Validates HMAC-SHA256 signature (X-Banking-Signature header).
        Deduplicates by event_id (stored in webhook_event_log).
        On valid confirmed event, routes to payment-management-api.
      parameters:
        - name: X-Banking-Signature
          in: header
          required: true
          description: "HMAC-SHA256 signature of request body"
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BankingWebhookEvent"
      responses:
        "200":
          description: Webhook received and processed
        "400":
          description: Invalid signature or malformed payload
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

components:
  schemas:
    BankingPaymentRequest:
      type: object
      required: [payment_order_id, amount, currency, target_account, execution_date]
      properties:
        payment_order_id:
          type: string
          format: uuid
          description: "Internal payment order reference"
        amount:
          type: number
          format: double
          minimum: 0.01
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        target_account:
          type: string
          description: "Supplier bank account identifier"
        execution_date:
          type: string
          format: date
        reference:
          type: string
          description: "Payment narrative / reference for bank statement"

    BankingPaymentResponse:
      type: object
      properties:
        payment_order_id:
          type: string
          format: uuid
        bank_reference:
          type: string
          description: "Banking System transaction identifier"
        status:
          type: string
          enum: [ACCEPTED, PROCESSING, CONFIRMED, FAILED]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    BankingWebhookEvent:
      type: object
      required: [event_id, payment_reference, status, occurred_at]
      properties:
        event_id:
          type: string
          format: uuid
          description: "Unique Banking System event identifier – used for deduplication"
        payment_reference:
          type: string
          description: "Bank transaction reference matching BankingPaymentResponse.bank_reference"
        status:
          type: string
          enum: [CONFIRMED, FAILED]
        occurred_at:
          type: string
          format: date-time
        failure_reason:
          type: string
          nullable: true

    ProblemDetails:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        error_code:
          type: string
        trace_id:
          type: string
