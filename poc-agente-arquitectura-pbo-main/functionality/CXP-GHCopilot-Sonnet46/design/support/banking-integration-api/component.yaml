component_name: banking-integration-api
component_type: api
layer: support
decision: create
phase: backend-component-design
generated_at: "2026-06-17"

purpose: >
  Adapter that isolates the domain from Banking System integration details.
  Sends payment orders, handles inbound webhook confirmations with HMAC-SHA256
  validation, enforces idempotency, and implements circuit breaker for resilience.

owner_scope: "Integration Architecture – Banking Adapter"

bian:
  aligned: true
  release: "14"
  selected_service_domain: FinancialGateway
  alignment_type: partial
  adoption_file: design/bian/bian-release14-source-index.yaml

responsibilities:
  - Send PaymentOrders to Banking System REST API
  - Query payment order status from Banking System
  - Receive and validate inbound banking webhooks (HMAC-SHA256 signature)
  - Enforce idempotency via X-Idempotency-Key to prevent duplicate payments
  - Implement circuit breaker and exponential backoff retry
  - Transform internal PaymentOrder ↔ Banking System schema

non_responsibilities:
  - Payment scheduling logic (delegated to payment-management-api)
  - Invoice state transitions (delegated to invoice-lifecycle-api)
  - Accounting entries (delegated to erp-integration-api)

dependencies:
  synchronous:
    - "Banking System (external – REST API)"
  asynchronous:
    publishes: []
    consumes: []

consumers:
  - payment-management-api

state_owner_if_any: null

data_ownership:
  owns_persistent_data: true
  persistence_model: >
    PostgreSQL tables:
    - banking_payment_log (id, payment_order_id, idempotency_key, status,
      bank_reference, sent_at, confirmed_at) for audit
    - webhook_event_log (id, event_id, payload_hash, received_at, processed) – append-only,
      used for webhook idempotency deduplication

cache_usage:
  uses_cache: false
  cache_model: null

events:
  publishes: []
  consumes: []

endpoints:
  - method: POST
    path: /api/v1/banking/payment-orders
    description: "Send payment order to Banking System"
    headers: ["X-Idempotency-Key"]

  - method: GET
    path: /api/v1/banking/payment-orders/{orderId}
    description: "Query payment order status from Banking System"

  - method: POST
    path: /api/v1/banking/webhooks/inbound
    description: "Receive and validate inbound banking webhook"
    security: "HMAC-SHA256 signature validation before processing"
    idempotency: "Deduplicate by event_id stored in webhook_event_log"

external_system:
  id: BankingSystem
  integration_type: "REST API + Secure Webhooks"
  auth: "mTLS + API Key"
  transport: "TLS 1.2+"
  webhook_security: "HMAC-SHA256 header: X-Banking-Signature"

resilience:
  retry:
    enabled: true
    max_retries: 3
    backoff: exponential
    initial_delay_ms: 1000
    idempotent: true
  circuit_breaker:
    enabled: true
    failure_threshold: 3
    timeout_seconds: 60
    half_open_calls: 1

nfrs:
  performance_sla_ms: 300
  security:
    transport: "TLS 1.2+ + mTLS for Banking System"
    webhook_validation: "HMAC-SHA256"
    idempotency: "X-Idempotency-Key"
  observability:
    tracing: "OpenTelemetry"
    metrics: "Prometheus (banking_requests_total, banking_errors_total, webhooks_received_total)"
    logging: "Structured JSON"
  reliability:
    circuit_breaker: true
    retry: true
    webhook_deduplication: true

