openapi: 3.0.3
info:
  title: ERP Integration API
  description: >
    Support API (Anti-Corruption Layer) for ERP integration.
    Handles supplier validation and accounting entry posting.
    BIAN alignment: FinancialAccounting + ContractorandSupplierAgreement (reference).
    Generated by: GitHub Copilot – Claude Sonnet 4.6
  version: "1.0.0"

servers:
  - url: /api/v1/erp
    description: Base path v1

tags:
  - name: suppliers
    description: Supplier validation via ERP
  - name: accounting
    description: Accounting entry registration in ERP

paths:
  /erp/suppliers/{supplierId}/validate:
    get:
      tags: [suppliers]
      operationId: validateSupplier
      summary: Validate supplier is active in ERP
      description: >
        Checks that the supplier exists and is active in the ERP system.
        Response is cached for 5 minutes per supplierId.
        BR-001: required before invoice registration.
      parameters:
        - name: supplierId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Supplier validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierValidationResponse"
        "404":
          description: Supplier not found in ERP
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "502":
          description: ERP upstream error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /erp/accounting/entries:
    post:
      tags: [accounting]
      operationId: postAccountingEntry
      summary: Post accounting entry to ERP ledger
      description: >
        Registers a ledger entry in the ERP after a payment has been confirmed.
        BIAN reference: LedgerPosting (FinancialAccounting).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountingEntryRequest"
      responses:
        "201":
          description: Accounting entry posted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountingEntryResponse"
        "422":
          description: Invalid entry data
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "502":
          description: ERP upstream error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

components:
  schemas:
    SupplierValidationResponse:
      type: object
      properties:
        supplier_id:
          type: string
          format: uuid
        is_valid:
          type: boolean
        name:
          type: string
        status:
          type: string
          enum: [ACTIVE, INACTIVE, BLOCKED]
        validated_at:
          type: string
          format: date-time

    AccountingEntryRequest:
      type: object
      required: [invoice_id, payment_order_id, amount, currency, payment_date]
      properties:
        invoice_id:
          type: string
          format: uuid
        payment_order_id:
          type: string
          format: uuid
        supplier_id:
          type: string
          format: uuid
        amount:
          type: number
          format: double
          minimum: 0.01
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        payment_date:
          type: string
          format: date
        reference:
          type: string
          description: "Bank transaction reference"

    AccountingEntryResponse:
      type: object
      properties:
        entry_id:
          type: string
        erp_reference:
          type: string
        status:
          type: string
          enum: [POSTED, PENDING, FAILED]
        posted_at:
          type: string
          format: date-time

    ProblemDetails:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        error_code:
          type: string
        trace_id:
          type: string
