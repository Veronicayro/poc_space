schema_version: "1.0"
functionality_id: CXP-GHCopilot-Sonnet46
component_name: invoice-management-api
component_type: api
layer: business
decision: create
phase: backend-component-design
generated_at: "2026-06-17"

purpose: >
  Business service implementing the invoice lifecycle: registration with supplier
  validation, duplicate prevention, approval/rejection workflow and cancellation.
  Orchestrates domain and support layers; persists the Invoice aggregate.

owner_scope: "Financial Operations – Accounts Payable"

bian:
  aligned: true
  release: "14"
  selected_service_domain: AccountsReceivable
  alignment_type: adapted
  adoption_file: design/bian/bian-service-domain-evaluation.yaml

responsibilities:
  - Register invoices after validating supplier existence via erp-integration-api (BR-001)
  - Prevent duplicate invoices by (supplier_id, invoice_number) (BR-002)
  - Assign initial status PENDING on registration (BR-003)
  - Orchestrate approval, rejection and cancellation with actor traceability (BR-004, BR-005)
  - Delegate state transitions to invoice-lifecycle-api
  - Persist Invoice entity in PostgreSQL
  - Enforce RBAC rules per operation

non_responsibilities:
  - State machine enforcement (delegated to invoice-lifecycle-api)
  - Banking connectivity (delegated to banking-integration-api)
  - Payment scheduling (delegated to payment-management-api)

dependencies:
  synchronous:
    - invoice-lifecycle-api
    - erp-integration-api
  asynchronous:
    publishes: [InvoiceRegistered, InvoiceApproved, InvoiceRejected, InvoiceCancelled]
    consumes: []

consumers:
  - accounts-payable-exp-api

state_owner_if_any: "Invoice aggregate (current status cached; source of truth in invoice-lifecycle-api)"

data_ownership:
  owns_persistent_data: true
  persistence_model: >
    PostgreSQL table: invoices (id, supplier_id, invoice_number, amount, currency,
    status, issue_date, due_date, created_at, updated_at).
    Unique constraint on (supplier_id, invoice_number).
    Indexes: status, supplier_id, due_date, created_at.

cache_usage:
  uses_cache: false
  cache_model: null

events:
  publishes:
    - InvoiceRegistered
    - InvoiceApproved
    - InvoiceRejected
    - InvoiceCancelled
  consumes: []

endpoints:
  - method: POST
    path: /api/v1/invoices
    description: "Register invoice – validate supplier, check duplicates, persist PENDING"
    business_rules: [BR-001, BR-002, BR-003]

  - method: GET
    path: /api/v1/invoices
    description: "List invoices with filters (status, supplier_id, date range)"

  - method: GET
    path: /api/v1/invoices/{id}
    description: "Get invoice detail by ID"

  - method: PUT
    path: /api/v1/invoices/{id}
    description: "Edit invoice (only allowed in PENDING state)"

  - method: POST
    path: /api/v1/invoices/{id}/approve
    description: "Approve invoice"
    business_rules: [BR-004, BR-005]

  - method: POST
    path: /api/v1/invoices/{id}/reject
    description: "Reject invoice (reason required)"
    business_rules: [BR-004]

  - method: POST
    path: /api/v1/invoices/{id}/cancel
    description: "Cancel invoice"

nfrs:
  performance_sla_ms: 300
  security:
    authentication: "JWT ****** from exp-api)"
    authorization: "Role check per operation"
    transport: "TLS 1.2+"
  observability:
    tracing: "OpenTelemetry"
    metrics: "Prometheus (invoice_created_total, invoice_approval_total)"
    logging: "Structured JSON"
  reliability:
    circuit_breaker_on: [erp-integration-api]
    retry_on: [erp-integration-api]
    retry_max: 3
    retry_backoff: exponential

status: draft
