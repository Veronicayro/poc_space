openapi: 3.0.3
info:
  title: Payment Management API
  description: >
    Business API for payment scheduling and execution lifecycle.
    BIAN alignment: Disbursement (semantic_alignment – DisbursementProcedure / DisbursementTransaction).
    Generated by: GitHub Copilot – Claude Sonnet 4.6
  version: "1.0.0"

servers:
  - url: /api/v1/payments
    description: Base path v1

tags:
  - name: payments
    description: Payment scheduling and execution

paths:
  /payments:
    get:
      tags: [payments]
      operationId: listPayments
      summary: List payment orders with filters
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [CREATED, SENT, CONFIRMED, FAILED, CANCELLED]
        - name: invoice_id
          in: query
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Payment order list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentListResponse"

    post:
      tags: [payments]
      operationId: schedulePayment
      summary: Schedule payment for an approved invoice
      description: >
        BR-006: invoice must be in APPROVED state.
        BR-007: scheduled_date is required and must be >= today.
        X-Idempotency-Key header required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SchedulePaymentRequest"
      parameters:
        - name: X-Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Payment scheduled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentOrderResponse"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "409":
          $ref: "#/components/responses/Conflict"

  /payments/{id}:
    get:
      tags: [payments]
      operationId: getPayment
      summary: Get payment order detail and status
      parameters:
        - $ref: "#/components/parameters/PaymentId"
      responses:
        "200":
          description: Payment order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentOrderResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /payments/{id}/execute:
    post:
      tags: [payments]
      operationId: executePayment
      summary: Trigger payment execution (internal/system use)
      parameters:
        - $ref: "#/components/parameters/PaymentId"
      responses:
        "200":
          description: Payment execution initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentOrderResponse"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /payments/webhooks/banking:
    post:
      tags: [payments]
      operationId: receiveBankingWebhook
      summary: Receive banking payment confirmation (routed from banking-integration-api)
      description: "Internal endpoint. banking-integration-api validates HMAC-SHA256 before routing here."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BankingWebhookPayload"
      responses:
        "200":
          description: Webhook processed
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

components:
  parameters:
    PaymentId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    NotFound:
      description: Not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    Conflict:
      description: Duplicate operation (idempotency key already processed)
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    UnprocessableEntity:
      description: Business rule or validation error
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

  schemas:
    PaymentOrderStatus:
      type: string
      enum: [CREATED, SENT, CONFIRMED, FAILED, CANCELLED]

    SchedulePaymentRequest:
      type: object
      required: [invoice_id, scheduled_date]
      properties:
        invoice_id:
          type: string
          format: uuid
        scheduled_date:
          type: string
          format: date
          description: "Payment execution date – must be >= today"

    PaymentOrderResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        invoice_id:
          type: string
          format: uuid
        scheduled_date:
          type: string
          format: date
        execution_date:
          type: string
          format: date-time
          nullable: true
        status:
          $ref: "#/components/schemas/PaymentOrderStatus"
        idempotency_key:
          type: string
          format: uuid
        bank_reference:
          type: string
          nullable: true
        amount:
          type: number
          format: double
        currency:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PaymentListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PaymentOrderResponse"
        total:
          type: integer
        cursor:
          type: string
          nullable: true

    BankingWebhookPayload:
      type: object
      required: [event_id, payment_reference, status]
      properties:
        event_id:
          type: string
          format: uuid
        payment_reference:
          type: string
        status:
          type: string
          enum: [CONFIRMED, FAILED]
        confirmed_at:
          type: string
          format: date-time
        failure_reason:
          type: string
          nullable: true

    ProblemDetails:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        error_code:
          type: string
        trace_id:
          type: string
