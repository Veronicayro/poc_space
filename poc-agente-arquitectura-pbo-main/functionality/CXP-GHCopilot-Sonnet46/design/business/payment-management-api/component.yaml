schema_version: "1.0"
functionality_id: CXP-GHCopilot-Sonnet46
component_name: payment-management-api
component_type: api
layer: business
decision: create
phase: backend-component-design
generated_at: "2026-06-17"

purpose: >
  Business service responsible for payment scheduling and execution lifecycle.
  Validates that invoices are APPROVED before scheduling, generates PaymentOrders,
  delegates execution to banking-integration-api and updates invoice state on
  banking webhook confirmation.

owner_scope: "Financial Operations – Treasury"

bian:
  aligned: true
  release: "14"
  selected_service_domain: Disbursement
  alignment_type: adapted
  adoption_file: design/bian/bian-service-domain-evaluation.yaml

responsibilities:
  - Validate that only APPROVED invoices can be scheduled (BR-006)
  - Enforce that a scheduled_date is required and ≥ current date (BR-007)
  - Generate PaymentOrder and persist it
  - Send PaymentOrder to banking-integration-api with idempotency key
  - Receive banking confirmation and update invoice state to PAID via invoice-lifecycle-api
  - Track payment status and expose it to consumers

non_responsibilities:
  - Invoice lifecycle state machine (delegated to invoice-lifecycle-api)
  - Direct banking protocol implementation (delegated to banking-integration-api)
  - Accounting entry creation (delegated to erp-integration-api)

dependencies:
  synchronous:
    - invoice-lifecycle-api
    - banking-integration-api
    - erp-integration-api
  asynchronous:
    publishes: [PaymentScheduled, PaymentOrderSent, PaymentConfirmed, PaymentFailed]
    consumes: []

consumers:
  - accounts-payable-exp-api

state_owner_if_any: "PaymentOrder aggregate"

data_ownership:
  owns_persistent_data: true
  persistence_model: >
    PostgreSQL table: payment_orders (id, invoice_id, scheduled_date, execution_date,
    status, idempotency_key, created_at, updated_at).
    Indexes: invoice_id, status, scheduled_date.

cache_usage:
  uses_cache: false
  cache_model: null

events:
  publishes:
    - PaymentScheduled
    - PaymentOrderSent
    - PaymentConfirmed
    - PaymentFailed
  consumes: []

endpoints:
  - method: POST
    path: /api/v1/payments
    description: "Schedule payment for an approved invoice"
    business_rules: [BR-006, BR-007]
    headers: ["X-Idempotency-Key"]

  - method: GET
    path: /api/v1/payments
    description: "List payment orders with filters"

  - method: GET
    path: /api/v1/payments/{id}
    description: "Get payment order detail and status"

  - method: POST
    path: /api/v1/payments/{id}/execute
    description: "Trigger payment execution (internal/system use)"

  - method: POST
    path: /api/v1/payments/webhooks/banking
    description: "Inbound banking confirmation (routed from banking-integration-api)"

nfrs:
  performance_sla_ms: 300
  security:
    authentication: "JWT ****** from exp-api)"
    authorization: "TREASURER role required for scheduling"
    transport: "TLS 1.2+"
  observability:
    tracing: "OpenTelemetry"
    metrics: "Prometheus (payments_scheduled_total, payments_confirmed_total, payments_failed_total)"
    logging: "Structured JSON + X-Correlation-ID"
  reliability:
    idempotency: "X-Idempotency-Key required for payment operations"
    circuit_breaker_on: [banking-integration-api, erp-integration-api]
    retry_on: [banking-integration-api]
    retry_max: 3
    retry_backoff: exponential

