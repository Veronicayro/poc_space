# =============================================================================
# VALIDATION RULES (from schema)
# =============================================================================

validation:
  rules:
    - id: "VAL-001"
      rule: "All domain APIs with action != crear MUST have catalog_ref"
      status: "DEFERRED to Phase 4 (all action=crear placeholders)"
    
    - id: "VAL-002"
      rule: "All domain APIs with bian_sd MUST have bian_operation"
      status: "✓ SATISFIED (all domain APIs have bian_operations)"
    
    - id: "VAL-003"
      rule: "All APIs with action=extender MUST have new_endpoints"
      status: "✓ SATISFIED (no extender actions in draft)"
    
    - id: "VAL-004"
      rule: "If layer applicable=false, apis field MUST NOT be present"
      status: "✓ SATISFIED (all 4 layers applicable=true)"
  
  overall_validation_status: "DRAFT (will be finalized in Phase 4)"
