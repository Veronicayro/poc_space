    - api: "LoanStatus-Experience-API"
      decision: "🔴 CREAR"
      reason: "No collision in catalog; read-only transparency BFF"
      
    - api: "LoanOriginationOrchestrator-Business-API"
      decision: "🔴 CREAR"
      reason: "Proprietary orchestration (no BIAN SD); no collision"
      
    - api: "PartyLifecycleMgmt-Domain-API"
      decision: "🔴 CREAR"
      reason: "BIAN-aligned (PartyLifecycleManagement); no existing API in catalog"
      
    - api: "CustomerOffer-Domain-API"
      decision: "🔴 CREAR"
      reason: "BIAN-aligned (CustomerOffer); CreditApplicationAPI is partial (request only, not offer/acceptance)"
      
    - api: "Underwriting-Domain-API"
      decision: "🔴 CREAR"
      reason: "BIAN-aligned (Underwriting); no existing API in catalog"
      
    - api: "LoanAuditLog-Support-API"
      decision: "🔴 CREAR"
      reason: "Cross-cutting compliance publisher; no collision"
  
