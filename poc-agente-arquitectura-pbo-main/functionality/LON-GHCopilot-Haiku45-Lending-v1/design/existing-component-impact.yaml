  catalogCollision:
    collisionId: "COLL-001"
    severity: "MEDIUM"
    flaggedInPhase: "Phase 1 (enterprise-capability-alignment)"
    
    collisionDetails:
      existingAPI: "CreditApplicationAPI v1.3"
      catalogLocation: "catalog/domains/loans.yaml#LoanOrigination/CreditApplicationAPI"
      capabilityId: "CAP-LOAN-001"
      capabilityName: "Loan Origination & Underwriting"
      
      overlap:
        percentage: 75  # CreditApplicationAPI covers ~75% of Phase 1 requirements
        useCasesOverlap: ["UC-001", "UC-002"]  # Direct overlap; UC-003..UC-008 require new design
        businessRulesOverlap: ["BR-001", "BR-002", "BR-008"]
      
      collisionReason: |
        This functionality (Digital Personal Loan Origination) overlaps with existing
        CreditApplicationAPI v1.3 which already covers loan application intake.
        
        However, CreditApplicationAPI v1.3 was designed for a broader scope
        (personal + auto loans) and does not explicitly integrate with:
        - Automated credit evaluation (Underwriting SD)
        - Personalized offer generation (pricing, terms)
        - Digital signature capture (e-signature integration)
        
        Gap: CreditApplicationAPI lacks orchestration layer for UC-003 through UC-008.
    
    resolutionMechanism: |
      Phase 4 (api-landscape-design) invokes api-landscape-governance/SKILL.md which:
      
      1. Reads CreditApplicationAPI v1.3 contract (OpenAPI)
      2. Compares against Phase 1 BIAN Service Domain evaluation
      3. Checks coverage of all 8 use cases
      4. Evaluates existing consumers (Web Banking, Mobile App)
      5. Decides autonomously:
         - REUSE: if coverage ≥95% and no consumers conflict
         - EXTEND: if coverage 70-95% and extension is low-risk
         - CREATE: if coverage <70% or risks are high
      6. Documents decision in design/api-landscape.yaml
      7. Records impact on existing consumers
    
    phase2Note: "Collision resolution is deferred to Phase 4 and handled autonomously by api-landscape-governance/SKILL.md. Do NOT make decision here."

