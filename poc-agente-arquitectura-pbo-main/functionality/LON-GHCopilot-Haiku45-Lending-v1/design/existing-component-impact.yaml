        coverage: "75%"
        coverageDetail: |
          ✓ Loan request capture (UC-001, UC-002) — 80% coverage
          ✗ Automated credit evaluation (UC-003) — 0% (requires Underwriting domain API)
          ✗ Offer generation with pricing (UC-004) — 20% (basic offer structure exists, pricing logic absent)
          ✗ Digital signature (UC-005) — 0% (requires external signature provider integration)
          ✗ Manual review (UC-006) — 0% (requires Underwriting domain API)
        
