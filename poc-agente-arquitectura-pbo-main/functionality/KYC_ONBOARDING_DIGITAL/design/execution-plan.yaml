functionality_id: KYC_ONBOARDING_DIGITAL
phase: scope-and-execution-planning
generated_at: "2026-06-22"

inferred_execution_mode: standard
execution_mode_override: standard
execution_mode_rationale: >
  Standard execution mode confirmed by user override and validated against constraints:
  no cloud-provider restriction declared; technology is Java; scope covers one new Business API
  (kyc-onboarding-api) orchestrating three existing Published catalog APIs and three external
  integrations. Full mode is not warranted (single component, no multi-runtime placement).
  Minimal mode is insufficient (BIAN alignment, persistence, events, and security/NFR views
  are required). Standard is the correct fit.

domain_standard_profile:
  provider: BIAN
  version: "14.0.0"
  rationale: >
    BIAN Release 14 PartyLifecycleManagement selected with 0.92 confidence in Phase 1.
    Contracts for kyc-onboarding-api (Business layer) will be BIAN-derived per Phase 7 rules.

# ─── Target components to design ────────────────────────────────────────────
# Derived from: context-pack + enterprise-capability-map + user target component override.

target_components:
  - component_id: kyc-onboarding-api
    layer: business
    description: >
      Business API orchestrator for the digital KYC onboarding lifecycle.
      Manages OnboardingCase state machine, coordinates downstream catalog APIs
      (CustomerProfileAPI, CustomerIdentityAPI, KYCScreeningAPI), calls external
      AML_SERVICE and ID_VERIFICATION_PROVIDER, and emits OnboardingStatusChanged
      domain events to NOTIFICATION_SERVICE.
    technology: Java
    bian_service_domain: PartyLifecycleManagement
    capabilities: [CAP-001, CAP-002, CAP-003, CAP-004, CAP-005]
    phase_priority: 1
    design_phases_required: [backend-component-design, backend-contract-design]

  - component_id: kyc-onboarding-event-adapter
    layer: support
    description: >
      Lightweight async event publisher that converts internal domain events
      (OnboardingStatusChanged, OnboardingApproved, OnboardingRejected) into the
      format expected by NOTIFICATION_SERVICE. Optional — may be implemented as
      an internal module of kyc-onboarding-api rather than a separate deployable.
    technology: Java
    bian_service_domain: null
    capabilities: [CAP-005]
    phase_priority: 2
    design_phases_required: [backend-component-design]
    notes: >
      To be confirmed in solution-landscape phase: separate component vs. internal adapter.
      Treated as CREATE_DEPENDENCY (not blocking Phase 3+).

# ─── Required design views ───────────────────────────────────────────────────

required_design_views:
  enterprise_capability_alignment: true     # completed in Phase 1
  backend_tobe: true                        # primary deliverable
  frontend: false                           # out of scope; channels (Web/Mobile) exist
  backend_transition: false                 # new API — no migration path required
  cloud_logical: false                      # no cloud provider specified
  cloud_azure: false
  cloud_aws: false
  cloud_gcp: false
  cloud_on_premise: false
  multicloud: false
  hybrid: false
  bigdata: false

# ─── Required layers ─────────────────────────────────────────────────────────

required_layers:
  - business        # kyc-onboarding-api (primary)
  - support         # event adapter (async notification)
  - data            # OnboardingCase, KYCResult, IdentityDocument persistence
  - events          # OnboardingStatusChanged domain events

# Layers NOT required for this functionality
excluded_layers:
  - experience      # No new Experience API needed; kyc-onboarding-api IS the Business API
                    # consumed by channel teams. Customer-facing experience is via existing
                    # Web/Mobile channels — out of scope for this package.
  - domain          # Atomic domain APIs (CustomerProfileAPI, CustomerIdentityAPI,
                    # KYCScreeningAPI) are Published in catalog and reused as-is.
  - cache           # No caching requirement identified for MVP; may be revisited post-MVP.
  - frontend        # Out of scope.
  - cloud           # No cloud placement requirement specified.

