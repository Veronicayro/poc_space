    actor: TREASURER
    rule: BR-CXP-007

  - from: APPROVED
    to: CANCELLED
    trigger: "cancelInvoice"
    actor: "ANALYST / MANAGER"
    rule: BR-CXP-010

  - from: SCHEDULED
    to: PAID
    trigger: "paymentConfirmed (webhook)"
