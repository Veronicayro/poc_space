  - id: APPROVED
    description: "Factura aprobada por Gerente Financiero"
    terminal: false
    color: blue

  - id: REJECTED
    description: "Factura rechazada; no procede para pago"
    terminal: true
    color: red

  - id: SCHEDULED
    description: "Pago programado con fecha definida"
    terminal: false
    color: purple

  - id: PAID
    description: "Pago ejecutado y confirmado por el banco"
    terminal: true
    color: green

  - id: CANCELLED
    description: "Factura cancelada antes del pago"
    terminal: true
    color: gray

