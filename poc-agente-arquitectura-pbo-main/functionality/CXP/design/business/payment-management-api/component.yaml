# Phase 5 Output: Component Design - payment-management-api
schema_version: "1.0"
functionality_id: CXP
component_id: payment-management-api
phase: backend-component-design
generated_at: "2026-06-17"

name: "Payment Management API"
layer: business
pattern: "Business Service"
type: REST API
version: "v1"
technology: "Node.js / Java Spring Boot"
base_path: "/api/v1/payments"

bian_alignment:
  service_domain: Disbursement
  adoption: semantic_alignment
  control_record: PaymentSchedule

description: >
  Servicio de negocio para la programación y ejecución de pagos a proveedores.
  Crea órdenes de pago (PaymentOrder), coordina con banking-integration-api para
  ejecución, y actualiza el estado de facturas vía invoice-lifecycle-api.

responsibilities:
  - "Programar pagos de facturas APPROVED (crear PaymentOrder)"
  - "Ejecutar pagos via banking-integration-api con idempotencia"
  - "Recibir confirmaciones de pago (webhook handler)"
  - "Transicionar facturas a SCHEDULED/PAID via invoice-lifecycle-api"
  - "Registrar historial de pagos"

capabilities: [CAP-CXP-002]
use_cases: [UC-CXP-004, UC-CXP-005, UC-CXP-007]
business_rules: [BR-CXP-007, BR-CXP-008, BR-CXP-009]

endpoints:
  - method: POST
    path: /payments
    description: "Programar pago para factura APPROVED"
    business_rules: [BR-CXP-007, BR-CXP-008]
  - method: GET
    path: /payments
    description: "Listar pagos con filtros"
  - method: GET
    path: /payments/{id}
    description: "Detalle de pago"
  - method: POST
    path: /payments/{id}/execute
    description: "Ejecutar pago programado"
    business_rules: [BR-CXP-009]
  - method: POST
    path: /webhooks/banking/payment-status
    description: "Recibir confirmación bancaria (webhook)"
    notes: "Validar HMAC-SHA256; idempotente"

persistence:
  database: PostgreSQL
  schema: cxp_payments
  tables:
    - name: payment_orders
      key_columns: [id, invoice_id]
      indexes: [status, invoice_id, scheduled_date]
    - name: idempotency_log
      description: "Log de idempotency_key para prevenir pagos duplicados"

downstream_dependencies:
  - api: invoice-lifecycle-api
    operations: [transition_to_scheduled, transition_to_paid]
  - api: banking-integration-api
    operations: [create_payment_order, get_payment_status]

nfr:
  sla_ms: 300
  idempotency: true
  circuit_breaker_on: [banking-integration-api]
  observability: true

maturity: draft
