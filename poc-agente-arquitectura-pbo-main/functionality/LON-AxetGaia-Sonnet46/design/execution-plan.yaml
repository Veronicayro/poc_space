# execution-plan.yaml — LON (Sistema de Originación de Créditos)
# Phase 2: scope-and-execution-planning
# Generated by: Axet Plugin – Target Architecture Design Agent v4.1.0
functionality_id: LON
generated_at: "2026-06-17"
domain_standard: BIAN-Release-14
execution_mode: full

summary: >
  LON es un sistema nuevo (greenfield) de originación de créditos bancarios.
  No existen APIs previas propias a reutilizar; las integraciones externas
  (Bureau de Crédito, Core Bancario, DMS) son sistemas externos existentes.
  El scope cubre 8 use cases, 5 actores, 12 estados de workflow y 4 BIAN
  Service Domains seleccionados.

scope:
  functionality_name: "Sistema de Originación de Créditos"
  type: greenfield
  domain_standard: BIAN-Release-14
  bian_service_domains:
    - CustomerOffer
    - Underwriting
    - CustomerCreditRating
    - Disbursement
  use_cases_in_scope:
    - UC-LON-001
    - UC-LON-002
    - UC-LON-003
    - UC-LON-004
    - UC-LON-005
    - UC-LON-006
    - UC-LON-007
    - UC-LON-008
  actors_in_scope:
    - CREDIT_OFFICER
    - RISK_ANALYST
    - CREDIT_MANAGER
    - CREDIT_COMMITTEE
    - DISBURSEMENT_OFFICER
  external_integrations:
    - CREDIT_BUREAU
    - CORE_BANKING
    - DMS

target_api_landscape:
  experience_apis:
    - id: API-LON-EXP-001
      name: credit-origination-exp-api
      layer: experience
      description: >
        BFF (Backend for Frontend) para la SPA React. Agrega y orquesta
        llamadas a APIs de dominio/negocio exponiéndolas de forma optimizada
        para el frontend. Soporta los 5 roles de usuario.
      bian_alignment: N/A (Experience layer — no BIAN SD directo)
      priority: 1
      status: to_design

  business_apis:
    - id: API-LON-BUS-001
      name: credit-request-api
      layer: business
      description: >
        API de gestión del ciclo de vida de solicitudes de crédito. Orquesta
        creación, actualización, envío, consulta y gestión del workflow de
        estados (state machine de 12 estados). Alineado a BIAN CustomerOffer.
      bian_alignment: CustomerOffer (semantic_alignment)
      bian_sd_source: architecture/cache/bian/release14.0.0/oas3/yamls/CustomerOffer.yaml
      use_cases: [UC-LON-001, UC-LON-002, UC-LON-004, UC-LON-005, UC-LON-006, UC-LON-008]
      priority: 1
      status: to_design

    - id: API-LON-BUS-002
      name: risk-assessment-api
      layer: business
      description: >
        API de evaluación de riesgo crediticio. Orquesta consulta al bureau,
        cálculo de DTI, registro del score y recomendación de aprobación.
        Alineado a BIAN Underwriting + CustomerCreditRating.
      bian_alignment: Underwriting (semantic_alignment); CustomerCreditRating (adapted)
      bian_sd_source: architecture/cache/bian/release14.0.0/oas3/yamls/Underwriting.yaml
      use_cases: [UC-LON-003]
      priority: 2
      status: to_design

  domain_apis:
    - id: API-LON-DOM-001
      name: disbursement-api
      layer: domain
      description: >
        API de ejecución de desembolso. Coordina la instrucción al core
        bancario, confirmación del desembolso y registro de referencia.
        Alineado a BIAN Disbursement (direct adoption).
      bian_alignment: Disbursement (direct)
      bian_sd_source: architecture/cache/bian/release14.0.0/oas3/yamls/Disbursement.yaml
      use_cases: [UC-LON-007]
      priority: 2
      status: to_design

  support_apis:
    - id: API-LON-SUP-001
      name: credit-bureau-adapter-api
      layer: support
      description: >
        Adaptador de integración con Bureau de Crédito externo (Equifax,
        TransUnion, Experian). Gestiona consulta de historial, score,
        listas negras y caché Redis TTL 24h.
      bian_alignment: N/A (Support/Integration layer)
      priority: 3
      status: to_design

    - id: API-LON-SUP-002
      name: core-banking-adapter-api
      layer: support
      description: >
        Adaptador de integración con Core Bancario. Gestiona validación KYC,
        creación del producto crédito, instrucción de desembolso y tabla de
        amortización.
      bian_alignment: N/A (Support/Integration layer)
      priority: 3
      status: to_design

    - id: API-LON-SUP-003
      name: dms-adapter-api
      layer: support
      description: >
        Adaptador de integración con Document Management System (DMS).
        Gestiona almacenamiento, recuperación y validación de documentos
        del expediente crediticio.
      bian_alignment: N/A (Support/Integration layer)
      priority: 3
      status: to_design

design_phases:
  - phase: solution_landscape
    status: pending
    deliverables:
      - design/architecture-overview.md
      - design/api-landscape.yaml
      - design/component-inventory.yaml

  - phase: api_architecture
    status: pending
    deliverables:
      - design/api-landscape.yaml (update)
      - design/experience-api-style-evaluation.md
      - design/adr/tobe/ADR-LON-*.md

  - phase: backend_component_design
    status: pending
    components_order:
      - credit-request-api       # Core del sistema — prioridad 1
      - risk-assessment-api      # Evaluación de riesgo — prioridad 2
      - disbursement-api         # Desembolso — prioridad 2
      - credit-origination-exp-api  # BFF — prioridad 1 (experiencia)
      - credit-bureau-adapter-api   # Integración bureau — prioridad 3
      - core-banking-adapter-api    # Integración core — prioridad 3
      - dms-adapter-api             # Integración DMS — prioridad 3

  - phase: backend_contract_design
    status: pending
    note: >
      Business/Domain APIs (credit-request-api, risk-assessment-api,
      disbursement-api) requieren contrato BIAN-derived + bian-adoption.yaml.
      Experience y Support APIs usan OpenAPI estándar.

  - phase: backend_diagram_design
    status: pending

  - phase: adr_generation
    status: pending

  - phase: validation_and_state_update
    status: pending

nfr_constraints:
  performance:
    sla_query_ms: 500
    sla_risk_eval_ms: 1000
    concurrent_users: 200
    throughput_peak: "50 solicitudes/hora"
  security:
    authentication: "OAuth2 / OpenID Connect / JWT"
    authorization: "RBAC — 5 roles"
    encryption_transit: "TLS 1.2+"
    encryption_rest: "AES-256"
  reliability:
    retry_policy: "Backoff exponencial para bureau y core bancario"
    circuit_breaker: "Umbral: 5 fallos en 30s"
    idempotency: "Endpoints de creación de solicitud y desembolso"
  observability:
    logging: "JSON estructurado + correlation ID"
    metrics: "Prometheus — tasa aprobación, tiempo evaluación"
    tracing: "OpenTelemetry"
  compliance:
    audit: "ISO 27001 / Basel III readiness"
    retention: "7 años mínimo"
    gdpr: "Trazabilidad de decisión crediticia"
