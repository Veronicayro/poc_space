  # ──────────────────────────────────────────────────────────────
  # BUSINESS LAYER
  # ──────────────────────────────────────────────────────────────
  - id: COMP-LON-BUS-001
    api_id: API-LON-BUS-001
    name: credit-request-api
    layer: business
    type: Business API
    path: design/business/credit-request-api
    bian_sd: CustomerOffer
    bian_adoption_level: semantic_alignment
    bian_source: architecture/cache/bian/release14.0.0/oas3/yamls/CustomerOffer.yaml
    maturity: draft
    design_status: to_design
    responsibilities:
      - Crear y gestionar solicitudes de crédito (CreditRequest)
      - Implementar state machine de 12 estados con validación por rol
      - Validar KYC del cliente con Core Bancario (vía adaptador)
      - Prevenir solicitudes duplicadas activas por cliente y tipo de crédito
      - Gestionar adjuntos documentales (referencias DMS)
      - Registrar decisiones crediticias con trazabilidad completa
      - Escalar automáticamente según umbrales de monto y riesgo
      - Mantener historial de transiciones (AuditLog)
    key_models:
      - CreditRequest (estado, tipo, monto, plazo, propósito)
      - CreditDecision (aprobación, rechazo, condiciones, motivo)
      - CreditDocument (referencia DMS, tipo, obligatoriedad)
      - AuditLog (actor, rol, estado_previo, estado_nuevo, timestamp)
      - WorkflowTransition (validación de transición permitida)
    state_machine:
      states:
        - DRAFT
        - SUBMITTED
        - UNDER_REVIEW
        - RISK_ASSESSED
        - PENDING_APPROVAL
        - PENDING_COMMITTEE
        - APPROVED
        - REJECTED
        - PENDING_DISBURSEMENT
        - DISBURSED
        - CANCELLED
        - EXPIRED
      key_transitions:
        - "DRAFT -> SUBMITTED (actor: CREDIT_OFFICER, requires: docs_complete)"
        - "SUBMITTED -> RISK_ASSESSED (actor: RISK_ANALYST)"
        - "RISK_ASSESSED -> PENDING_APPROVAL (actor: system, auto)"
        - "PENDING_APPROVAL -> APPROVED (actor: CREDIT_MANAGER, requires: within_limit)"
        - "PENDING_APPROVAL -> PENDING_COMMITTEE (actor: CREDIT_MANAGER, requires: exceeds_limit)"
        - "PENDING_COMMITTEE -> APPROVED (actor: CREDIT_COMMITTEE)"
        - "PENDING_APPROVAL|PENDING_COMMITTEE -> REJECTED (actor: CREDIT_MANAGER|CREDIT_COMMITTEE, requires: rejection_reason)"
        - "APPROVED -> DISBURSED (actor: DISBURSEMENT_OFFICER)"
    persistence:
      technology: PostgreSQL
      tables: [credit_requests, credit_decisions, credit_documents, audit_logs]
      characteristics: ACID, particionamiento por año, índices por estado/cliente/fecha
    dependencies:
      - core-banking-adapter-api  # KYC validation
      - dms-adapter-api           # Document management
    nfr:
      sla_ms: 500
      idempotency: true
      audit: completa

  - id: COMP-LON-BUS-002
    api_id: API-LON-BUS-002
    name: risk-assessment-api
    layer: business
    type: Business API
    path: design/business/risk-assessment-api
    bian_sd: Underwriting
    bian_secondary_sd: CustomerCreditRating
    bian_adoption_level: semantic_alignment
    bian_source: architecture/cache/bian/release14.0.0/oas3/yamls/Underwriting.yaml
    maturity: draft
    design_status: to_design
    responsibilities:
      - Orquestar consulta al bureau de crédito (vía adaptador)
      - Calcular DTI ratio (Debt-to-Income)
      - Registrar score crediticio, nivel de riesgo y recomendación
      - Determinar nivel de aprobación requerido (gerente vs comité)
      - Sugerir rechazo automático si score < umbral mínimo configurable
      - Gestionar caché Redis TTL 24h de reportes de bureau
    key_models:
      - RiskAssessment (score, risk_level, dti_ratio, recommendation)
      - BureauReport (score, historial, deudas, listas_negras)
      - RiskPolicy (umbrales de score, límites de DTI, umbrales de monto)
    risk_levels: [LOW, MEDIUM, HIGH, CRITICAL]
    recommendations: [APPROVE, REJECT, ESCALATE]
    cache:
      technology: Redis
      ttl: "24 horas"
      key: "bureau_report:{customerId}"
      fallback: "Consulta directa al bureau si Redis no disponible"
    persistence:
      technology: PostgreSQL
      tables: [risk_assessments]
    dependencies:
      - credit-bureau-adapter-api  # Bureau score + report
    nfr:
      sla_ms: 1000
      cache_ttl: "24h"

