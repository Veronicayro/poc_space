# existing-component-impact.yaml — LON (Sistema de Originación de Créditos)
# Phase 2: scope-and-execution-planning
# Generated by: Axet Plugin – Target Architecture Design Agent v4.1.0
functionality_id: LON
generated_at: "2026-06-17"
analysis_type: greenfield

summary: >
  LON es un sistema greenfield. No existen APIs internas previas ni módulos
  del sistema LON a impactar. El impacto se limita a la adopción/consumo de
  sistemas externos preexistentes (Core Bancario, Bureau de Crédito, DMS)
  y al eventual registro de nuevas APIs en el API Gateway corporativo.

existing_internal_components:
  status: none
  note: >
    No se han identificado componentes internos preexistentes del sistema LON.
    Todos los componentes son nuevos (greenfield).

external_systems_consumed:
  - id: EXT-LON-001
    system: Core Bancario
    integration_type: "REST API / Batch Sync"
    impact_type: consumer
    operations_consumed:
      - Validación KYC (verificar cliente existente)
      - Creación del producto crédito post-aprobación
      - Instrucción de desembolso a cuenta destino
      - Registro de tabla de amortización
    impact_assessment: >
      LON consume servicios del Core Bancario como cliente externo.
      No se realizan modificaciones al Core; se requiere acuerdo de
      contrato de integración (SLA, formatos, autenticación).
    risk: MEDIUM
    risk_rationale: >
      Dependencia crítica: el desembolso y la validación KYC dependen
      de la disponibilidad del Core Bancario. Circuit breaker requerido.
    required_actions:
      - Definir contrato de API con el equipo del Core Bancario
      - Acordar SLA de disponibilidad y timeouts
      - Implementar circuit breaker + retry con backoff exponencial
      - Establecer cuenta de servicio / credenciales OAuth2

  - id: EXT-LON-002
    system: Bureau de Crédito
    integration_type: "REST API / Synchronous"
    impact_type: consumer
    operations_consumed:
      - Consulta de historial crediticio del cliente
      - Obtención de score crediticio
      - Verificación en listas negras y de riesgo
      - Reporte de deudas vigentes y vencidas
    impact_assessment: >
      LON consume servicios del Bureau de Crédito (Equifax, TransUnion,
      Experian) como cliente externo. Las consultas tienen costo unitario
      y se implementa caché Redis TTL 24h para minimizarlas.
    risk: MEDIUM
    risk_rationale: >
      Costo por transacción y latencia variable (200-800ms). Caché Redis
      mitiga el riesgo; fallback a consulta directa si Redis no disponible.
    required_actions:
      - Definir proveedor de bureau (Equifax, TransUnion o Experian)
      - Obtener credenciales de acceso a la API del bureau
      - Implementar caché Redis TTL 24h con política de invalidación
      - Registrar consentimiento del cliente para consulta al bureau

  - id: EXT-LON-003
    system: Document Management System (DMS)
    integration_type: "REST API"
    impact_type: consumer
    operations_consumed:
      - Almacenamiento de documentos del expediente (cédula, estados financieros, etc.)
      - Recuperación de documentos por referencia
      - Validación de integridad de documentos
    impact_assessment: >
      LON delega la gestión documental al DMS. Los documentos no se
      almacenan en la base de datos de LON, solo las referencias DMS.
      Dependencia de disponibilidad del DMS para adjuntar documentos.
    risk: LOW
    risk_rationale: >
      Si el DMS no está disponible, el proceso de adjuntar documentos
      se bloquea pero la solicitud puede continuar en estado DRAFT.
      Fallback: almacenamiento temporal configurable.
    required_actions:
      - Confirmar API contract del DMS (endpoints, autenticación, formatos)
      - Definir política de fallback si DMS no disponible
      - Acordar tipos de documentos soportados y límites de tamaño

api_gateway_registration:
  required: true
  note: >
    Las siguientes APIs nuevas de LON deben registrarse en el API Gateway
    corporativo al momento del despliegue:
  apis_to_register:
    - credit-origination-exp-api (Experience — público para frontend)
    - credit-request-api (Business — interno entre capas)
    - risk-assessment-api (Business — interno entre capas)
    - disbursement-api (Domain — interno entre capas)
    - credit-bureau-adapter-api (Support — interno)
    - core-banking-adapter-api (Support — interno)
    - dms-adapter-api (Support — interno)

identity_provider_impact:
  required: true
  note: >
    Se requiere registro de los siguientes roles RBAC en el Identity Provider
    corporativo (OAuth2 / OpenID Connect):
  roles_to_register:
    - CREDIT_OFFICER
    - RISK_ANALYST
    - CREDIT_MANAGER
    - CREDIT_COMMITTEE
    - DISBURSEMENT_OFFICER

database_impact:
  type: new_schema
  technology: PostgreSQL
  note: >
    Se requiere creación de nuevo schema/base de datos para LON.
    No impacta bases de datos existentes de otros sistemas.
  entities_to_create:
    - credit_requests
    - risk_assessments
    - credit_decisions
    - disbursements
    - credit_documents
    - audit_logs
  characteristics:
    - ACID compliance
    - Particionamiento por año para solicitudes históricas
    - Índices por estado, cliente_id y fecha
    - Auditoría completa (audit trail tables)

cache_infrastructure_impact:
  type: new_cache_instance
  technology: Redis
  note: >
    Se requiere instancia Redis para caché de reportes de bureau
    (TTL 24h por cliente). Puede ser instancia compartida o dedicada
    según la política de infraestructura del banco.
